name: NEIS 학사일정 동기화

on:
  # 매일 새벽 1시(KST) = UTC 16:00 (전날)
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci --omit=dev || npm install --omit=dev

      - name: NEIS 학사일정 sync
        env:
          NEIS_API_KEY: ${{ secrets.NEIS_API_KEY }}
          NEIS_ATPT_CODE: ${{ secrets.NEIS_ATPT_CODE }}
          NEIS_SCHOOL_CODE: ${{ secrets.NEIS_SCHOOL_CODE }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node crawler/syncNeisSchedule.js
