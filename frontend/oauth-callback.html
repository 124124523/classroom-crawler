<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>동의 완료 처리 중...</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      min-height: 100vh; margin: 0;
      background-color: #1B4832;
      background-image:
        linear-gradient(rgba(255,255,255,0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.045) 1px, transparent 1px);
      background-size: 40px 40px;
      display: flex; align-items: center; justify-content: center;
      padding: 24px; color: #fff;
      font-family: var(--font-body, 'Pretendard', sans-serif);
    }
    .card {
      width: 100%; max-width: 480px; text-align: center;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px; padding: 50px 36px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.35);
    }
    h1 { font-size: 1.4rem; margin: 0 0 12px; }
    p { font-size: 0.92rem; color: rgba(255,255,255,0.75); line-height: 1.6; }
    .icon { font-size: 56px; margin-bottom: 16px; }
    .spinner {
      display: inline-block;
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.18);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .err { color: #ffb0b0; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="spinner"></div>
    <h1>동의 처리 중...</h1>
    <p>잠시만 기다려주세요.</p>
  </div>

  <script type="module">
    import { doc, setDoc, collection, query, where, getDocs } from 'https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js';
    import { db, GOOGLE_OAUTH } from './js/firebase-init.js';
    import { getCurrentUser, getMyMapping, redirectToRolePage } from './js/auth.js';

    const card = document.getElementById('card');
    const params = new URLSearchParams(location.search);
    const code = params.get('code');
    const state = params.get('state');
    const error = params.get('error');

    function showSuccess() {
      card.innerHTML = `
        <div class="icon">✅</div>
        <h1>동의 완료</h1>
        <p>본인 과제 제출 상태가 자동 추적됩니다.</p>
        <p style="margin-top:14px;font-size:0.82rem;opacity:0.6;">3초 후 대시보드로 이동...</p>
      `;
      setTimeout(async () => {
        const m = await getMyMapping();
        if (m) redirectToRolePage(m.role);
        else location.href = 'login.html';
      }, 3000);
    }

    // 토큰 교환 대기 UI + 폴링
    function showPolling(legacyId, deadline) {
      let secondsLeft = Math.max(0, Math.floor((deadline - Date.now()) / 1000));
      card.innerHTML = `
        <div class="spinner"></div>
        <h1>동의 처리 중...</h1>
        <p>Google 인증을 마쳤습니다.<br>최대 <span id="countdown">${secondsLeft}</span>초 안에 자동 동기화됩니다.</p>
        <p style="margin-top:14px;font-size:0.82rem;opacity:0.6;">완료되면 자동으로 대시보드로 이동합니다.</p>
      `;
      const tick = setInterval(() => {
        const left = Math.max(0, Math.floor((deadline - Date.now()) / 1000));
        const el = document.getElementById('countdown');
        if (el) el.textContent = left;
        if (left <= 0) clearInterval(tick);
      }, 1000);

      const pollInterval = setInterval(async () => {
        const ok = await checkTokenExists(legacyId);
        if (ok) {
          clearInterval(pollInterval);
          clearInterval(tick);
          showSuccess();
        } else if (Date.now() >= deadline) {
          clearInterval(pollInterval);
          clearInterval(tick);
          showRetry();
        }
      }, 30 * 1000);  // 30초마다 확인
    }

    async function checkTokenExists(legacyId) {
      try {
        const q = query(collection(db, 'tokens'), where('user_id', '==', legacyId));
        const snap = await getDocs(q);
        return !snap.empty;
      } catch { return false; }
    }

    function showRetry() {
      card.innerHTML = `
        <div class="icon">⏱️</div>
        <h1>처리 지연</h1>
        <p>아직 동기화가 완료되지 않았습니다.<br>GitHub Actions 일시 지연 또는 OAuth 코드 만료(10분)일 수 있습니다.</p>
        <p style="margin-top:18px;">
          <a href="classroom-consent.html" style="display:inline-block;padding:10px 20px;background:#fff;color:#1B4832;border-radius:8px;text-decoration:none;font-weight:700;margin-right:8px;">다시 시도</a>
          <a href="student.html" style="color:rgba(255,255,255,0.7);">건너뛰고 대시보드</a>
        </p>
      `;
    }

    function showError(msg) {
      card.innerHTML = `
        <div class="icon">⚠️</div>
        <h1>동의 처리 실패</h1>
        <div class="err" style="text-align:left;">${msg}</div>
        <p style="margin-top:14px;"><a href="classroom-consent.html" style="color:#fff;">다시 시도</a> · <a href="student.html" style="color:#fff;">건너뛰기</a></p>
      `;
    }

    (async () => {
      if (error) { showError('Google 동의가 취소되었습니다: ' + error); return; }
      if (!code || !state) { showError('잘못된 콜백 요청입니다.'); return; }

      const user = await getCurrentUser();
      if (!user) { location.href = 'login.html'; return; }
      const mapping = await getMyMapping();
      if (!mapping) { location.href = 'profile-link.html'; return; }

      // CSRF 체크: state 가 sessionStorage 에 저장한 nonce 와 일치해야 함
      const storedNonce = sessionStorage.getItem('oauth_state');
      const storedLegacyId = sessionStorage.getItem('oauth_legacy_id');
      if (!storedNonce || state !== storedNonce) {
        showError('보안 검증 실패: 동의 흐름을 처음부터 다시 시도해주세요.');
        return;
      }
      // legacyId 가 sessionStorage 의 것과 매핑의 것이 일치하는지도 확인
      if (storedLegacyId !== mapping.legacyId) {
        showError('계정 매핑 불일치: 다시 로그인 후 시도해주세요.');
        return;
      }
      // 사용 후 정리
      sessionStorage.removeItem('oauth_state');
      sessionStorage.removeItem('oauth_legacy_id');

      // 우선 Cloudflare Worker 가 설정돼 있으면 즉시 교환 시도
      if (GOOGLE_OAUTH.proxyUrl) {
        try {
          await processWithWorker(code, mapping);
          return;
        } catch (e) {
          console.warn('[oauth] Worker 즉시 교환 실패, pendingTokens fallback:', e.message);
          // fallback 으로 진행
        }
      }

      // Fallback: pendingTokens 에 코드 저장 → GitHub Actions 가 5분 안에 교환
      try {
        await setDoc(doc(db, 'pendingTokens', mapping.legacyId), {
          user_id: mapping.legacyId,
          code,
          redirect_uri: GOOGLE_OAUTH.redirectUri,
          requested_at: new Date().toISOString(),
        });
        if (await checkTokenExists(mapping.legacyId)) {
          showSuccess();
        } else {
          showPolling(mapping.legacyId, Date.now() + 10 * 60 * 1000);
        }
      } catch (e) {
        console.error(e);
        showError('서버에 저장 실패: ' + e.message);
      }
    })();

    // ─── Worker 를 통한 즉시 토큰 교환 + 본인 클래스룸 크롤 ─────────────
    async function processWithWorker(code, mapping) {
      // 1) Worker 에게 code → tokens 교환 요청
      const res = await fetch(GOOGLE_OAUTH.proxyUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code, redirect_uri: GOOGLE_OAUTH.redirectUri }),
      });
      if (!res.ok) throw new Error('Worker HTTP ' + res.status);
      const tk = await res.json();
      if (tk.error) throw new Error(tk.error_description || tk.error);
      if (!tk.access_token) throw new Error('access_token 없음');

      // 2) 본인 토큰을 Firestore tokens 에 저장
      const ts = new Date().toISOString().replace('T', ' ').slice(0, 19);
      const expiry = new Date(Date.now() + (tk.expires_in || 3600) * 1000)
        .toISOString().replace('T', ' ').slice(0, 19);

      // 기존 토큰 doc 확인 (user_id 매칭)
      const existQ = query(collection(db, 'tokens'), where('user_id', '==', mapping.legacyId));
      const existSnap = await getDocs(existQ);
      const tokenData = {
        user_id: mapping.legacyId,
        access_token: tk.access_token,
        token_expiry: expiry,
        updated_at: ts,
      };
      if (tk.refresh_token) tokenData.refresh_token = tk.refresh_token;

      let tokenDocId;
      if (existSnap.empty) {
        // 새 토큰 — docId 를 user_id 기반으로 (Admin SDK 처럼 max+1 못 함, 충돌 회피용)
        tokenDocId = `u_${mapping.legacyId}`;
        tokenData.created_at = ts;
        await setDoc(doc(db, 'tokens', tokenDocId), tokenData);
      } else {
        tokenDocId = existSnap.docs[0].id;
        await setDoc(existSnap.docs[0].ref, tokenData, { merge: true });
      }

      // 3) Worker 가 받은 access_token 으로 즉시 본인 Classroom 크롤
      showCrawling();
      await crawlOwnClassroom(tk.access_token, mapping.legacyId);

      // 4) 완료 → 대시보드
      showSuccess();
    }

    function showCrawling() {
      card.innerHTML = `
        <div class="spinner"></div>
        <h1>본인 클래스룸 동기화 중...</h1>
        <p>본인의 수업 + 과제 + 제출 상태를 가져오고 있습니다.</p>
      `;
    }

    // 본인 토큰으로 Classroom API 직접 호출 → Firestore 에 저장
    async function crawlOwnClassroom(accessToken, legacyId) {
      const headers = { Authorization: `Bearer ${accessToken}` };

      // 본인 수업 목록 (ACTIVE + ARCHIVED)
      const [activeRes, archivedRes] = await Promise.all([
        fetch('https://classroom.googleapis.com/v1/courses?studentId=me&courseStates=ACTIVE&pageSize=50', { headers }),
        fetch('https://classroom.googleapis.com/v1/courses?studentId=me&courseStates=ARCHIVED&pageSize=50', { headers }),
      ]);
      const activeData = activeRes.ok ? await activeRes.json() : { courses: [] };
      const archivedData = archivedRes.ok ? await archivedRes.json() : { courses: [] };
      const courses = [...(activeData.courses || []), ...(archivedData.courses || [])];

      const cutoffDate = new Date(Date.now() + 9*60*60*1000 - 30*24*60*60*1000)
        .toISOString().slice(0, 10);
      const ts = new Date().toISOString().replace('T', ' ').slice(0, 19);

      // 각 수업의 coursework + 본인 제출 상태 fetch (병렬)
      const allCw = [];
      const allSubs = [];
      await Promise.all(courses.map(async (course) => {
        try {
          const [cwRes, subRes] = await Promise.all([
            fetch(`https://classroom.googleapis.com/v1/courses/${course.id}/courseWork?courseWorkStates=PUBLISHED&pageSize=50`, { headers }),
            fetch(`https://classroom.googleapis.com/v1/courses/${course.id}/courseWork/-/studentSubmissions?userId=me&pageSize=200`, { headers }),
          ]);
          if (cwRes.ok) {
            const d = await cwRes.json();
            for (const cw of (d.courseWork || [])) {
              const due = parseDueDate(cw.dueDate, cw.dueTime);
              if (!due || due.slice(0, 10) < cutoffDate) continue;
              allCw.push({
                coursework_id: cw.id,
                course_id: course.id,
                course_name: course.name,
                title: cw.title,
                description: cw.description || null,
                due_date: due,
                state: cw.state || 'PUBLISHED',
                link: cw.alternateLink || null,
              });
            }
          }
          if (subRes.ok) {
            const d = await subRes.json();
            for (const sub of (d.studentSubmissions || [])) allSubs.push(sub);
          }
        } catch { /* 무시 */ }
      }));

      // coursework 저장 (배치 — 500 한도 안전 위해 그냥 개별 setDoc)
      const writeOps = allCw.map(item =>
        setDoc(doc(db, 'coursework', item.coursework_id), {
          ...item,
          fetched_by: legacyId,
          fetched_at: ts,
        }, { merge: true })
      );

      // 제출(TURNED_IN/RETURNED) → completions
      const COMPLETED = new Set(['TURNED_IN', 'RETURNED']);
      for (const sub of allSubs) {
        if (!COMPLETED.has(sub.state)) continue;
        const docId = `${legacyId}_coursework_${sub.courseWorkId}`;
        writeOps.push(setDoc(doc(db, 'completions', docId), {
          user_id: legacyId,
          target_type: 'coursework',
          target_id: sub.courseWorkId,
          completed_at: ts,
          source: 'classroom',
          submission_state: sub.state,
        }, { merge: true }));
      }

      await Promise.all(writeOps);
      console.log(`[oauth-callback] coursework ${allCw.length}, submissions ${allSubs.length} 동기화 완료`);
    }

    // crawler/auth.js 의 parseDueDate 와 동일한 로직 (UTC dueDate+dueTime → KST 문자열)
    function parseDueDate(dueDate, dueTime) {
      if (!dueDate) return null;
      const { year, month, day } = dueDate;
      if (dueTime && (dueTime.hours != null || dueTime.minutes != null)) {
        const utcH = dueTime.hours || 0;
        const utcM = dueTime.minutes || 0;
        const utc = new Date(Date.UTC(year, month - 1, day, utcH, utcM));
        const kst = new Date(utc.getTime() + 9 * 60 * 60 * 1000);
        const ky = kst.getUTCFullYear();
        const km = String(kst.getUTCMonth() + 1).padStart(2, '0');
        const kd = String(kst.getUTCDate()).padStart(2, '0');
        const kh = String(kst.getUTCHours()).padStart(2, '0');
        const ki = String(kst.getUTCMinutes()).padStart(2, '0');
        return `${ky}-${km}-${kd} ${kh}:${ki}:00`;
      }
      return `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')} 23:59:00`;
    }
  </script>
</body>
</html>
