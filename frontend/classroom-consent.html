<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Classroom 동의 — SchoolBoard</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      min-height: 100vh;
      background-color: #1B4832;
      background-image:
        linear-gradient(rgba(255,255,255,0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.045) 1px, transparent 1px);
      background-size: 40px 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #fff;
      font-family: var(--font-body, 'Pretendard', sans-serif);
    }
    .card {
      width: 100%; max-width: 540px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 40px 36px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.35);
    }
    h1 { font-size: 1.5rem; font-weight: 800; margin: 0 0 8px; }
    .subtitle { font-size: 0.9rem; color: rgba(255,255,255,0.7); margin-bottom: 24px; line-height: 1.55; }
    .benefit-list {
      background: rgba(0,0,0,0.2);
      border-radius: 12px;
      padding: 18px 22px;
      margin-bottom: 24px;
    }
    .benefit-list li {
      list-style: none;
      padding: 6px 0 6px 26px;
      position: relative;
      font-size: 0.9rem;
      line-height: 1.5;
    }
    .benefit-list li::before {
      content: '✓';
      position: absolute; left: 0; top: 6px;
      color: #6FCFA1; font-weight: 700;
    }
    .scope-info {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.55);
      line-height: 1.5;
      margin-bottom: 24px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      border-left: 3px solid rgba(255,255,255,0.2);
    }
    .btn-primary {
      width: 100%; padding: 14px;
      background: #fff; color: #1B4832;
      border: none; border-radius: 10px;
      font-size: 0.95rem; font-weight: 700;
      cursor: pointer; margin-bottom: 10px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-skip {
      display: block; text-align: center;
      padding: 10px; color: rgba(255,255,255,0.65);
      text-decoration: underline; font-size: 0.85rem;
    }
    .top-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 18px; font-size: 0.8rem; color: rgba(255,255,255,0.55);
    }
    .top-bar a { color: rgba(255,255,255,0.7); text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="top-bar">
      <span id="emailLabel"></span>
      <a href="#" id="logoutLink">로그아웃</a>
    </div>
    <h1>Google Classroom 자동 추적</h1>
    <div class="subtitle">권한을 동의하면 본인 과제 제출 상태가 <strong>자동으로 추적</strong>됩니다. 일일이 완료 체크 안 해도 됩니다.</div>

    <ul class="benefit-list">
      <li><strong>제출한 과제 자동 완료 표시</strong> — 클래스룸에서 제출하면 자동 반영</li>
      <li><strong>완료된 과제 자동 숨김</strong> — 깔끔한 미제출 목록만 표시</li>
      <li><strong>마감 임박 알림 정확도 향상</strong> — 진짜 안 낸 과제만 알림</li>
    </ul>

    <div class="scope-info">
      🔒 <strong>요청하는 권한:</strong> 본인의 수업 목록과 과제 제출 상태 읽기. 학교 계정에 로그인된 본인 클래스룸만 접근하며, 정보는 본인 계정에만 표시됩니다.
    </div>

    <button class="btn-primary" id="consentBtn">
      <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.20454c0-.63818-.05727-1.25182-.16364-1.84091H9v3.48137h4.84364c-.20864 1.125-.84273 2.07818-1.79591 2.71591v2.25818h2.90817c1.70181-1.56682 2.68409-3.87409 2.68409-6.61455z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.46727-.80591 5.95636-2.18182l-2.90817-2.25818c-.80591.54-1.83727.85909-3.04819.85909-2.34409 0-4.32818-1.58318-5.03591-3.71045H.95682v2.33182C2.43818 15.98318 5.48182 18 9 18z" fill="#34A853"/>
        <path d="M3.96409 10.71c-.18-.54-.28227-1.11682-.28227-1.71 0-.59318.10227-1.17.28227-1.71V4.95818H.95682C.34727 6.17318 0 7.54773 0 9c0 1.45227.34727 2.82682.95682 4.04182l3.00727-2.33182z" fill="#FBBC05"/>
        <path d="M9 3.57955c1.32136 0 2.50773.45409 3.44045 1.34591l2.58136-2.58136C13.46318.89182 11.42591 0 9 0 5.48182 0 2.43818 2.01682.95682 4.95818L3.96409 7.29c.70773-2.12727 2.69182-3.71045 5.03591-3.71045z" fill="#EA4335"/>
      </svg>
      <span id="consentBtnText">Google 계정으로 동의하기</span>
    </button>

    <a href="#" class="btn-skip" id="skipLink">나중에 하기 (수동 체크 사용)</a>
  </div>

  <script type="module">
    import {
      getCurrentUser, getMyMapping, hasClassroomConsent,
      startClassroomConsent, redirectToRolePage, logout
    } from './js/auth.js';

    const btn = document.getElementById('consentBtn');
    const btnText = document.getElementById('consentBtnText');

    (async () => {
      const user = await getCurrentUser();
      if (!user || !user.emailVerified) { location.href = 'login.html'; return; }
      const mapping = await getMyMapping();
      if (!mapping) { location.href = 'profile-link.html'; return; }

      // 이미 동의했으면 바로 역할 페이지로
      if (await hasClassroomConsent()) {
        redirectToRolePage(mapping.role);
        return;
      }

      document.getElementById('emailLabel').textContent = user.email;
    })();

    document.getElementById('logoutLink').addEventListener('click', async (e) => {
      e.preventDefault();
      await logout();
      location.href = 'login.html';
    });

    document.getElementById('consentBtn').addEventListener('click', async () => {
      btn.disabled = true;
      btnText.textContent = 'Google 로 이동 중...';
      const mapping = await getMyMapping();
      startClassroomConsent(mapping.legacyId);
    });

    document.getElementById('skipLink').addEventListener('click', async (e) => {
      e.preventDefault();
      const mapping = await getMyMapping();
      redirectToRolePage(mapping.role);
    });
  </script>
</body>
</html>
