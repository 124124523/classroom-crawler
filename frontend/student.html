<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SchoolBoard — 학생</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Assignment Board ── */
    .board-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }
    .board-scroll-wrap { overflow-x: auto; padding-bottom: 8px; }
    .assignment-board { display: flex; gap: 16px; min-width: max-content; }
    .subject-col { width: 220px; flex-shrink: 0; }
    .subject-col-header {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
      padding: 10px 14px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .subject-name { font-size: 0.85rem; font-weight: 700; color: var(--text); }
    .subject-count { font-size: 0.72rem; color: var(--text3); background: var(--surface3); padding: 2px 7px; border-radius: 99px; }
    .subject-cards {
      background: var(--bg2);
      border: 1px solid var(--border); border-top: none;
      border-radius: 0 0 var(--radius-sm) var(--radius-sm);
      padding: 10px; display: flex; flex-direction: column; gap: 8px; min-height: 80px;
    }
    .assign-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 12px;
      cursor: pointer; transition: all 0.18s; position: relative; overflow: hidden;
    }
    .assign-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; background: var(--accent); border-radius: 2px 0 0 2px;
    }
    .assign-card.type-진로::before { background: var(--blue); }
    .assign-card.completed { opacity: 0.5; }
    .assign-card.completed::before { background: var(--muted); }
    .assign-card:hover { border-color: var(--border2); background: var(--surface2); transform: translateY(-1px); }
    .assign-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 6px; margin-bottom: 6px; }
    .assign-title { font-size: 0.83rem; font-weight: 600; color: var(--text); line-height: 1.4; flex: 1; }
    .assign-card.completed .assign-title { text-decoration: line-through; color: var(--text3); }
    .assign-card.completed .check-btn::after { content: '✓'; color: #fff; font-size: 11px; font-weight: 700; }
    .assign-card.completed .check-btn:hover { background: var(--orange) !important; border-color: var(--orange) !important; }
    .assign-card.completed .check-btn:hover::after { content: '↩'; font-size: 12px; }
    .check-btn {
      width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border2);
      background: transparent; flex-shrink: 0; transition: all 0.15s;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
    }
    .check-btn.checked { background: var(--accent); border-color: var(--accent); }
    .check-btn.checked::after { content: '✓'; color: #fff; font-size: 11px; font-weight: 700; }
    .assign-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .assign-due { font-size: 0.72rem; color: var(--text3); display: flex; align-items: center; gap: 3px; }
    .assign-due.urgent { color: var(--red); font-weight: 600; }
    .assign-due.soon   { color: var(--orange); }

    /* ── Notice Board ── */
    .notice-list { display: flex; flex-direction: column; gap: 1px; }
    .notice-item {
      display: flex; align-items: center; gap: 14px;
      padding: 13px 16px; background: var(--surface);
      border-radius: var(--radius-sm); cursor: pointer;
      transition: all 0.15s; border: 1px solid transparent;
    }
    .notice-item:hover { background: var(--surface2); border-color: var(--border); }
    .notice-type-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .notice-info { flex: 1; min-width: 0; }
    .notice-title { font-size: 0.88rem; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .notice-meta { font-size: 0.73rem; color: var(--text3); margin-top: 2px; display: flex; gap: 8px; }
    .notice-date { margin-left: auto; font-size: 0.75rem; color: var(--text3); flex-shrink: 0; }
    .notice-new { font-size: 0.65rem; background: var(--red); color: #fff; padding: 1px 5px; border-radius: 99px; font-weight: 700; }

    /* ── Meals ── */
    .meal-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .meal-header { background: linear-gradient(135deg, var(--primary-d), var(--primary)); padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; }
    .meal-header h3 { font-family: var(--font-display); font-size: 1rem; color: var(--mint); }
    .meal-date { font-size: 0.75rem; color: rgba(168,230,195,0.7); }
    .meal-tabs { display: flex; border-bottom: 1px solid var(--border); }
    .meal-tab { flex: 1; padding: 10px; text-align: center; font-size: 0.8rem; font-weight: 500; color: var(--text3); cursor: pointer; border: none; background: transparent; border-bottom: 2px solid transparent; transition: all 0.15s; }
    .meal-tab.active { color: var(--accent); border-bottom-color: var(--accent); background: rgba(114,201,154,0.05); }
    .meal-content { padding: 16px 18px; }
    .meal-menu { font-size: 0.83rem; color: var(--text2); line-height: 2; }
    .meal-menu span { display: block; }
    .meal-cal { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); font-size: 0.75rem; color: var(--text3); display: flex; align-items: center; gap: 6px; }

    /* ── Grid Layouts ── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 1024px) { .grid-2 { grid-template-columns: 1fr; } }

    /* ── Section Header ── */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .section-title {
      font-family: var(--font-display); font-size: 1.1rem; font-weight: 700;
      color: var(--text); display: flex; align-items: center; gap: 8px;
    }
    .section-title .icon-wrap {
      width: 28px; height: 28px; background: var(--surface2); border-radius: 7px;
      display: flex; align-items: center; justify-content: center; color: var(--accent);
    }

    /* ── Detail Panel ── */
    .detail-panel {
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: var(--radius-lg); width: 100%; max-width: 640px;
      max-height: 80vh; overflow-y: auto; box-shadow: var(--shadow);
      animation: modalIn 0.25s ease;
    }
    .detail-header {
      padding: 22px 26px 16px; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--surface); z-index: 2;
    }
    .detail-body { padding: 20px 26px; }
    .detail-title { font-size: 1.1rem; font-weight: 700; line-height: 1.45; }
    .detail-meta { font-size: 0.78rem; color: var(--text3); margin-top: 6px; display: flex; gap: 14px; flex-wrap: wrap; }
    .detail-content { font-size: 0.88rem; color: var(--text2); line-height: 1.8; white-space: pre-wrap; }
    .detail-images { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; margin-top: 16px; }
    .detail-images img { border-radius: var(--radius-sm); border: 1px solid var(--border); cursor: pointer; transition: opacity 0.15s; }
    .detail-images img:hover { opacity: 0.85; }

    /* ── Comments ── */
    .comments-section { margin-top: 20px; padding-top: 18px; border-top: 1px solid var(--border); }
    .comments-title { font-size: 0.85rem; font-weight: 600; color: var(--text2); margin-bottom: 12px; }
    .comment-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
    .comment-item { background: var(--surface2); border-radius: var(--radius-sm); padding: 10px 14px; }
    .comment-author { font-size: 0.78rem; font-weight: 600; color: var(--accent); }
    .comment-text { font-size: 0.83rem; color: var(--text2); margin-top: 3px; }
    .comment-time { font-size: 0.7rem; color: var(--text3); margin-top: 2px; }
    .comment-input-wrap { display: flex; gap: 8px; }
    .comment-input { flex: 1; padding: 9px 12px; font-size: 0.84rem; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); }
    .comment-input:focus { border-color: var(--accent); }
    .comment-submit { padding: 9px 16px; background: var(--primary-l); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 0.83rem; font-weight: 600; cursor: pointer; transition: background 0.15s; }
    .comment-submit:hover { background: var(--accent2); }

    /* ── Modal Complete Btn ── */
    .modal-complete-btn {
      display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px;
      border-radius: var(--radius-sm); font-size: 0.82rem; font-weight: 600;
      cursor: pointer; border: 1.5px solid var(--border2); background: transparent;
      color: var(--text3); transition: all 0.18s;
    }
    .modal-complete-btn:hover { background: var(--surface2); color: var(--text); }
    .modal-complete-btn.is-done { background: rgba(114,201,154,0.12); border-color: var(--accent2); color: var(--accent); }
    .modal-complete-btn.is-done:hover { background: rgba(217,112,112,0.1); border-color: var(--red); color: var(--red); }
    .modal-complete-btn .btn-check-icon {
      width: 16px; height: 16px; border-radius: 50%; border: 2px solid currentColor;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      font-size: 10px; font-weight: 700; transition: all 0.15s;
    }

    /* ── Sidebar overlay ── */
    .sidebar-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.55); z-index: 99;
      backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
    }
    @media (max-width: 768px) { .sidebar-overlay.active { display: block; } }

    /* ── Sidebar Tab ── */
    .sidebar-tab {
      display: none; position: fixed; top: 50%; left: 0;
      transform: translateY(-50%); z-index: 101;
      background: var(--primary-l); color: var(--mint); border: none;
      border-radius: 0 8px 8px 0; width: 22px; height: 56px; cursor: pointer;
      transition: left 0.3s ease, background 0.2s;
      box-shadow: 2px 0 12px rgba(0,0,0,0.4);
      align-items: center; justify-content: center; padding: 0;
    }
    .sidebar-tab svg { transition: transform 0.3s ease; flex-shrink: 0; }
    .sidebar-tab.open { left: var(--sidebar-w); background: var(--surface3); }
    .sidebar-tab.open svg { transform: rotate(180deg); }
    @media (max-width: 768px) { .sidebar-tab { display: flex; } }

    .section-page { display: none; }
    .section-page.active { display: block; }

    /* ── Weekly Timetable Grid ── */
    .tt-grid-wrap { overflow-x: auto; padding-bottom: 8px; }
    .tt-weekly-grid {
      display: grid;
      grid-template-columns: 44px repeat(5, 1fr);
      gap: 3px;
      min-width: 560px;
    }
    .tt-cell {
      padding: 0;
      min-height: 56px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tt-header {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 4px;
      text-align: center;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--text2);
    }
    .tt-header.today-col {
      background: rgba(114,201,154,0.12);
      border-color: var(--accent2);
      color: var(--accent);
    }
    .tt-period-label {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.68rem;
      color: var(--muted);
      font-weight: 600;
      min-height: 56px;
    }
    .tt-subject-cell {
      border-radius: 6px;
      padding: 7px 6px;
      text-align: center;
      border: 1px solid transparent;
      min-height: 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      transition: all 0.15s;
      cursor: default;
    }
    .tt-subject-cell.has-class {
      background: var(--surface);
      border-color: var(--border);
    }
    .tt-subject-cell.has-class:hover {
      border-color: var(--border2);
      background: var(--surface2);
      transform: translateY(-1px);
    }
    .tt-subject-cell.has-class.type-일반 {
      border-left: 2px solid var(--accent);
    }
    .tt-subject-cell.has-class.type-진로 {
      border-left: 2px solid var(--blue);
    }
    .tt-subject-cell.has-class.today-col {
      background: rgba(114,201,154,0.06);
      border-color: rgba(114,201,154,0.25);
    }
    .tt-subject-cell.empty {
      background: var(--bg2);
      border-color: var(--border);
      opacity: 0.5;
    }
    .tt-subject-cell.current-period {
      background: rgba(114,201,154,0.15) !important;
      border-color: var(--accent) !important;
      box-shadow: 0 0 0 1px var(--accent2);
    }
    .tt-subject-cell.current-period .tt-subj-text {
      color: var(--accent);
      font-weight: 700;
    }
    .tt-subj-text {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
      word-break: keep-all;
    }
    .tt-subj-type {
      font-size: 0.62rem;
      color: var(--text3);
      font-weight: 500;
    }
    .tt-now-indicator {
      display: inline-block;
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      margin-bottom: 2px;
      animation: blink 1.5s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }
    .tt-homeroom-badge {
      display: inline-flex; align-items: center;
      gap: 6px; background: rgba(114,201,154,0.1);
      border: 1px solid rgba(114,201,154,0.2);
      border-radius: 99px; padding: 4px 12px;
      font-size: 0.78rem; color: var(--accent); font-weight: 600;
    }
    .tt-today-highlight {
      background: rgba(114,201,154,0.06);
      border: 1px solid rgba(114,201,154,0.15);
      border-radius: var(--radius); padding: 14px 16px; margin-bottom: 16px;
    }
    .tt-today-label {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 8px;
    }
    .tt-today-slots {
      display: flex; flex-wrap: wrap; gap: 6px;
    }
    .tt-today-slot {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; padding: 6px 10px;
      font-size: 0.78rem; color: var(--text); font-weight: 500;
      display: flex; align-items: center; gap: 6px;
    }
    .tt-today-slot .period-num {
      font-size: 0.65rem; color: var(--muted);
      background: var(--surface2); border-radius: 4px;
      padding: 1px 5px; font-weight: 700;
    }
    .tt-today-slot.current-period {
      border-color: var(--accent2);
      background: rgba(114,201,154,0.08);
      color: var(--accent);
    }
    .tt-subject-type-map {
      display: flex; gap: 12px; margin-top: 12px; flex-wrap: wrap;
    }

    /* ── Calendar ── */
    .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .cal-month-label { font-family: var(--font-display); font-size: 1.25rem; font-weight: 700; color: var(--text); }
    .cal-nav-btn { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius-sm); color: var(--text2); cursor: pointer; transition: all 0.15s; }
    .cal-nav-btn:hover { background: var(--surface3); color: var(--text); }
    .cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 4px; }
    .cal-weekday { text-align: center; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.04em; color: var(--text3); padding: 6px 0; }
    .cal-weekday:first-child { color: var(--red); }
    .cal-weekday:last-child  { color: var(--blue); }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
    .cal-cell {
      min-height: 88px; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 6px; cursor: pointer;
      transition: background 0.15s, border-color 0.15s; position: relative; overflow: hidden;
    }
    .cal-cell:hover { background: var(--surface2); border-color: var(--border2); }
    .cal-cell.today { border-color: rgba(114,201,154,0.4); background: rgba(114,201,154,0.06); }
    .cal-cell.today .cal-day-num { background: var(--accent); color: #0D1810; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-weight: 700; }
    .cal-cell.other-month { opacity: 0.38; }
    .cal-cell.selected { border-color: var(--accent2); background: rgba(114,201,154,0.1); box-shadow: 0 0 0 1px var(--accent2); }
    .cal-cell.sunday   .cal-day-num { color: var(--red); }
    .cal-cell.saturday .cal-day-num { color: var(--blue); }
    .cal-day-num { font-size: 0.8rem; font-weight: 600; color: var(--text2); line-height: 1; margin-bottom: 5px; }
    .cal-events { display: flex; flex-direction: column; gap: 2px; }
    .cal-event-chip { font-size: 0.66rem; font-weight: 500; padding: 2px 5px; border-radius: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.4; }
    .cal-event-chip.type-assign { background: rgba(114,201,154,0.18); color: var(--accent); }
    .cal-event-chip.type-assign.진로 { background: rgba(88,153,201,0.18); color: var(--blue); }
    .cal-event-chip.type-assign.completed { background: rgba(100,130,110,0.12); color: var(--muted); text-decoration: line-through; }
    .cal-event-chip.type-personal { background: rgba(212,147,74,0.18); color: var(--orange); }
    .cal-more { font-size: 0.63rem; color: var(--text3); padding: 1px 4px; }
    .cal-cell.drop-valid { background: rgba(114,201,154,0.14) !important; border-color: rgba(114,201,154,0.5) !important; box-shadow: inset 0 0 0 2px rgba(114,201,154,0.35); }
    .cal-cell.drop-valid:hover, .cal-cell.drop-over { background: rgba(114,201,154,0.26) !important; border-color: var(--accent) !important; box-shadow: inset 0 0 0 2px var(--accent); }
    .cal-cell.drop-invalid { opacity: 0.28 !important; cursor: not-allowed !important; }
    .cal-cell.drop-flash { animation: dropFlash 0.45s ease; }
    @keyframes dropFlash { 0% { background: rgba(114,201,154,0.45); } 100% { background: var(--surface); } }

    .cal-layout { display: grid; grid-template-columns: 1fr 300px; gap: 20px; align-items: start; }
    @media (max-width: 1100px) { .cal-layout { grid-template-columns: 1fr; } .cal-right-col { display: none; } .cal-right-col.mobile-show { display: flex; } }
    .cal-right-col { display: flex; flex-direction: column; gap: 12px; position: sticky; top: calc(var(--header-h) + 20px); }
    .cal-panel-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 14px; }
    .cal-panel-tab { flex: 1; padding: 8px 10px; font-size: 0.78rem; font-weight: 600; color: var(--text3); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: all 0.15s; text-align: center; }
    .cal-panel-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .cal-panel-tab:hover:not(.active) { color: var(--text2); }
    .cal-tab-content { display: none; }
    .cal-tab-content.active { display: block; }
    .cal-add-form { border-top: 1px solid var(--border); margin-top: 14px; padding-top: 14px; }
    .cal-add-form-title { font-size: 0.75rem; font-weight: 700; color: var(--text3); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 8px; }
    .cal-add-row { display: flex; gap: 6px; }
    .cal-add-input { flex: 1; background: var(--surface2); border: 1px solid var(--border2); color: var(--text); border-radius: var(--radius-sm); padding: 7px 10px; font-size: 0.82rem; font-family: var(--font-body); }
    .cal-add-input:focus { outline: none; border-color: var(--accent); }
    .cal-add-btn { padding: 7px 12px; background: var(--primary-l); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 0.78rem; font-weight: 600; cursor: pointer; white-space: nowrap; transition: background 0.15s; }
    .cal-add-btn:hover { background: var(--accent2); }
    .cal-drag-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
    .cal-drag-hint { font-size: 0.73rem; color: var(--muted); margin-bottom: 12px; display: flex; align-items: center; gap: 5px; }
    .cal-drag-list { display: flex; flex-direction: column; gap: 5px; max-height: 260px; overflow-y: auto; }
    .cal-drag-chip { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: grab; transition: all 0.15s; user-select: none; }
    .cal-drag-chip:hover { background: var(--surface3); border-color: var(--border2); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
    .cal-drag-chip:active { cursor: grabbing; }
    .cal-drag-chip.dragging { opacity: 0.45; transform: none; }
    .cal-drag-chip-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .cal-drag-chip-info { flex: 1; min-width: 0; }
    .cal-drag-chip-title { font-size: 0.8rem; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cal-drag-chip-sub { font-size: 0.69rem; color: var(--text3); margin-top: 1px; }
    .cal-drag-chip-due { font-size: 0.69rem; font-weight: 600; flex-shrink: 0; padding: 2px 6px; border-radius: 99px; }
    .cal-drag-chip-due.urgent { background: rgba(217,112,112,0.15); color: var(--red); }
    .cal-drag-chip-due.soon   { background: rgba(212,147,74,0.15);  color: var(--orange); }
    .cal-drag-chip-due.ok     { background: rgba(114,201,154,0.12); color: var(--accent); }
    .cal-detail-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
    .cal-detail-date { font-family: var(--font-display); font-size: 1rem; font-weight: 700; color: var(--accent); margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .cal-detail-empty { color: var(--muted); font-size: 0.83rem; text-align: center; padding: 24px 0; }
    .cal-detail-item { display: flex; gap: 10px; align-items: flex-start; padding: 9px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: opacity 0.15s; }
    .cal-detail-item:last-child { border-bottom: none; }
    .cal-detail-item:hover { opacity: 0.8; }
    .cal-detail-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
    .cal-detail-title { font-size: 0.85rem; font-weight: 500; color: var(--text); line-height: 1.4; }
    .cal-detail-sub { font-size: 0.72rem; color: var(--text3); margin-top: 2px; }
    .cal-legend { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 14px; }
    .cal-legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.75rem; color: var(--text3); }
    .cal-legend-dot { width: 8px; height: 8px; border-radius: 50%; }
    .cal-grid.drag-active .cal-cell { transition: opacity 0.15s, background 0.15s, box-shadow 0.15s; }

    /* ── Stats bar ── */
    .stats-bar { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .stat-chip { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 16px; flex: 1; min-width: 100px; }
    .stat-chip .s-val { font-size: 1.5rem; font-weight: 700; color: var(--accent); font-family: var(--font-display); }
    .stat-chip .s-lbl { font-size: 0.75rem; color: var(--text3); margin-top: 1px; }

    /* ── Profile ── */
    .profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 900px; }
    @media (max-width: 800px) { .profile-grid { grid-template-columns: 1fr; } }
    .profile-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .profile-card-header { background: var(--surface2); padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
    .profile-card-title { font-size: 0.92rem; font-weight: 700; color: var(--text); }
    .profile-card-body { padding: 20px; }
    .profile-avatar-section { display: flex; align-items: center; gap: 16px; padding: 20px; border-bottom: 1px solid var(--border); }
    .profile-avatar-large {
      width: 64px; height: 64px; border-radius: 50%;
      background: var(--primary); display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; font-weight: 700; color: var(--mint); flex-shrink: 0;
    }
    .profile-info-text .profile-name { font-size: 1.1rem; font-weight: 700; color: var(--text); }
    .profile-info-text .profile-id   { font-size: 0.82rem; color: var(--text3); margin-top: 3px; }

    /* Timetable inside profile */
    .tt-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    .tt-table th {
      background: var(--surface2); color: var(--text2);
      font-size: 0.72rem; font-weight: 600; letter-spacing: 0.04em;
      padding: 7px 10px; border: 1px solid var(--border); text-align: center;
    }
    .tt-table td {
      padding: 8px 10px; border: 1px solid var(--border);
      color: var(--text); vertical-align: top; text-align: center;
    }
    .tt-table tr:hover td { background: var(--surface2); }
    .tt-subj-name { font-weight: 600; font-size: 0.82rem; line-height: 1.4; }
    .tt-subj-meta { font-size: 0.7rem; color: var(--text3); margin-top: 2px; }
    .tt-empty { color: var(--muted); font-size: 0.75rem; }
    .tt-general { border-left: 3px solid var(--accent); }
    .tt-career  { border-left: 3px solid var(--blue); }
    .subject-list-profile { display: flex; flex-direction: column; gap: 6px; max-height: 320px; overflow-y: auto; }
    .subj-row { display: flex; align-items: center; gap: 10px; padding: 9px 12px; background: var(--surface2); border-radius: var(--radius-sm); }
    .subj-row-name { font-size: 0.85rem; font-weight: 600; flex: 1; }
    .subj-row-meta { font-size: 0.73rem; color: var(--text3); }
  </style>
</head>
<body>
<div class="app-shell">

  <!-- 사이드바 탭 버튼 -->

  <!-- 모바일 오버레이 -->

      <div class="nav-item" data-section="notices" onclick="showSection('notices', this)">

          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>

          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>

      </div>

      <div class="nav-section-label">개인</div>

          <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>

      </div>
      <div class="nav-item" data-section="meals" onclick="showSection('meals', this)">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
          <line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/>
        </svg>
        오늘의 학식
      </div>
      <div class="nav-item" data-section="profile" onclick="showSection('profile', this)">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        프로필
      </div>
    </nav>

    <div class="sidebar-footer">
      <button class="btn-logout" onclick="logout()">로그아웃</button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-content">
    <header class="main-header">
      <button class="hamburger" onclick="toggleSidebar()">
        <span></span><span></span><span></span>
      </button>
      <div class="page-title" id="pageTitle">수행평가</div>
      <div class="header-right">
        <span class="header-date" id="headerDate"></span>
      </div>
    </header>

    <main class="page-content">

      <!-- ========== ASSIGNMENTS ========== -->
      <div class="section-page active" id="page-assignments">
        <div class="board-controls">
          <div class="section-title">
            <div class="icon-wrap">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
              </svg>
            </div>
            수행평가 보드
          </div>
          <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
            <div class="filter-tabs" id="typeFilter">
              <button class="filter-tab active" data-val="">전체</button>
              <button class="filter-tab" data-val="일반">일반</button>
              <button class="filter-tab" data-val="진로">진로</button>

            <div class="filter-tabs" id="statusFilter">
              <button class="filter-tab active" data-val="pending">미완료</button>
              <button class="filter-tab" data-val="done">완료</button>

          </div>
        </div>
        <div class="stats-bar" id="assignStats"></div>
        <div class="board-scroll-wrap">
          <div class="assignment-board" id="assignmentBoard">
            <div style="padding:48px;color:var(--muted);font-size:0.85rem;"><span class="spinner"></span> 과제 불러오는 중...</div>
          </div>
        </div>
      </div>

      <!-- ========== NOTICES ========== -->
      <div class="section-page" id="page-notices">
        <div class="section-header">
          <div class="section-title">
            <div class="icon-wrap">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
              </svg>
            </div>
            공지사항
          </div>
          <div style="display:flex;gap:8px;">
            <div class="filter-tabs" id="noticeSubjectFilter">
              <button class="filter-tab active" data-val="">전체</button>
            </div>
          </div>
        </div>
        <div class="notice-list" id="noticeList">
          <div style="padding:48px;text-align:center;color:var(--muted);"><span class="spinner"></span></div>

      <!-- ========== CALENDAR ========== -->
      <!-- ===== TIMETABLE PAGE ===== -->
      <div class="section-page" id="page-timetable">

          <div class="section-title">
            <div class="icon-wrap">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
              </svg>
            </div>
            시간표
          </div>
          <div id="ttHomroomBadge" class="tt-homeroom-badge" style="display:none">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span id="ttHomroomText"></span>
          </div>
        </div>

        <!-- Today's schedule highlight -->
        <div class="tt-today-highlight" id="ttTodayPanel">

          <div class="tt-today-slots" id="ttTodaySlots"></div>

        <!-- Weekly grid -->
        <div class="card" style="padding:20px">
          <div class="tt-grid-wrap">
            <div id="ttWeeklyGrid" class="tt-weekly-grid">

            </span>

              <span style="width:10px;height:10px;border-radius:2px;background:var(--blue);display:inline-block"></span> 진로과목
            </span>
          </div>
        </div>
      </div>

      <div class="section-page" id="page-calendar">
        <div class="section-header">
          <div class="section-title">
            <div class="icon-wrap">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
            </div>
            캘린더
          </div>
          <div class="cal-legend">
            <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--accent)"></div> 수행평가 (일반)</div>
            <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--blue)"></div> 수행평가 (진로)</div>

                <path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>

        <div style="max-width: 480px;" id="mealWrap">
          <div style="padding:40px;text-align:center;color:var(--muted);font-size:0.85rem;"><span class="spinner"></span></div>

      <!-- ========== PROFILE ========== -->

          <div class="section-title">
            <div class="icon-wrap">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
              </svg>
            </div>
            프로필
          </div>

        <!-- 상단: 아바타 + 기본 정보 -->
        <div class="card" style="margin-bottom:20px;padding:20px">
          <div style="display:flex;align-items:center;gap:16px">
            <div class="profile-avatar-large" id="profileAvatarLarge">?</div>
            <div>
              <div style="font-size:1.1rem;font-weight:700;color:var(--text)" id="profileDisplayName">-</div>
              <div style="font-size:0.82rem;color:var(--text3);margin-top:3px">아이디: <code id="profileDisplayId" style="color:var(--accent)">-</code></div>
              <div style="font-size:0.78rem;color:var(--muted);margin-top:2px">역할: 학생</div>
            </div>
          </div>
        </div>

        <div class="profile-grid">
          <!-- 수강 과목 -->
          <div class="profile-card">
            <div class="profile-card-header">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
              </svg>
              <div class="profile-card-title">수강 과목</div>
            </div>
            <div class="profile-card-body">
              <div class="subject-list-profile" id="profileSubjectList">
                <div style="color:var(--muted);font-size:0.83rem;text-align:center;padding:16px"><span class="spinner"></span></div>
              </div>
            </div>
          </div>

          <!-- 시간표 (수강 데이터 기반) -->
          <div class="profile-card" style="grid-column: 1 / -1;">
            <div class="profile-card-header">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5">
                <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
              </svg>
              <div class="profile-card-title">나의 수강 시간표</div>
              <div style="margin-left:auto;display:flex;gap:8px;align-items:center;">
                <span class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--accent);width:8px;height:8px;border-radius:50%;flex-shrink:0;"></div> <span style="font-size:0.72rem;color:var(--text3)">일반</span></span>
                <span class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--blue);width:8px;height:8px;border-radius:50%;flex-shrink:0;"></div> <span style="font-size:0.72rem;color:var(--text3)">진로</span></span>
              </div>
            </div>
            <div class="profile-card-body">
              <div id="timetableTableWrap">
                <div style="color:var(--muted);font-size:0.83rem;text-align:center;padding:20px"><span class="spinner"></span></div>
              </div>
            </div>
          </div>

          <!-- 비밀번호 변경 -->
          <div class="profile-card" style="max-width:480px;">
            <div class="profile-card-header">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--orange)" stroke-width="2.5">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <div class="profile-card-title" style="color:var(--orange)">비밀번호 변경</div>
            </div>
            <div class="profile-card-body">
              <div class="form-group">
                <label class="form-label">현재 비밀번호</label>
                <input class="form-input" type="password" id="curPwInput" placeholder="현재 비밀번호" />
              </div>
              <div class="form-group">
                <label class="form-label">새 비밀번호</label>
                <input class="form-input" type="password" id="newPwInput" placeholder="새 비밀번호" />
              </div>
              <div class="form-group">
                <label class="form-label">새 비밀번호 확인</label>
                <input class="form-input" type="password" id="newPwConfirmInput" placeholder="새 비밀번호 다시 입력" />
              </div>
              <button class="btn btn-primary" style="width:100%;background:linear-gradient(135deg,var(--orange),#B8732A)" onclick="changePassword()">비밀번호 변경</button>
            </div>
          </div>
        </div>
      </div>

    </main>
  </div>
</div>

<div class="modal-backdrop" id="noticeModal" style="display:none" onclick="closeModal('noticeModal')">
  <div class="detail-panel" onclick="event.stopPropagation()">
    <div class="detail-header">
      <div>
        <div class="detail-title" id="noticeDetailTitle"></div>
        <div class="detail-meta" id="noticeDetailMeta"></div>
      </div>
      <button class="btn-icon" onclick="closeModal('noticeModal')">✕</button>
    </div>
    <div class="detail-body">
      <div class="detail-content" id="noticeDetailContent"></div>
      <div class="detail-images" id="noticeDetailImages"></div>
      <div class="comments-section">
        <div class="comments-title">댓글</div>
        <div class="comment-list" id="noticeCommentList"></div>
        <div class="comment-input-wrap">
          <input class="comment-input" type="text" id="noticeCommentInput" placeholder="댓글 입력..." />
          <button class="comment-submit" onclick="submitComment('notice')">등록</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="assignModal" style="display:none" onclick="closeModal('assignModal')">
  <div class="detail-panel" onclick="event.stopPropagation()">
    <div class="detail-header">
      <div style="flex:1;min-width:0">
        <div class="detail-title" id="assignDetailTitle"></div>
        <div class="detail-meta" id="assignDetailMeta"></div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
        <button class="modal-complete-btn" id="modalCompleteBtn" onclick="modalToggleComplete()">
          <span class="btn-check-icon" id="modalCheckIcon"></span>
          <span id="modalCompleteLabel">완료</span>
        </button>
        <button class="btn-icon" onclick="closeModal('assignModal')">✕</button>
      </div>
    </div>
    <div class="detail-body">
      <div class="detail-content" id="assignDetailContent"></div>
      <div class="detail-images" id="assignDetailImages"></div>
      <div class="comments-section">
        <div class="comments-title">댓글</div>
        <div class="comment-list" id="assignCommentList"></div>
        <div class="comment-input-wrap">
          <input class="comment-input" type="text" id="assignCommentInput" placeholder="댓글 입력..." />
          <button class="comment-submit" onclick="submitComment('assignment')">등록</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script>
// ── State ──
let currentUser   = null;
let assignments   = [];
let notices       = [];
let subjects      = [];
let events        = [];
let currentNotice = null;
let currentAssign = null;
let filterType    = '';
let filterStatus  = 'pending';
let filterSubject = '';

// 읽음 상태 관리 (localStorage)
function getReadSet(key) {
  try { return new Set(JSON.parse(localStorage.getItem(key) || '[]')); } catch { return new Set(); }
}
function saveReadSet(key, set) {
  try { localStorage.setItem(key, JSON.stringify([...set])); } catch {}
}
let readAssignIds  = getReadSet('readAssignIds');
let readNoticeIds  = getReadSet('readNoticeIds');

// ── Init ──
(async () => {
  try {
    const res = await fetch('/api/me', { credentials: 'include' });
    if (!res.ok) { location.href = 'login.html'; return; }
    currentUser = await res.json();

    if (currentUser.role === 'admin')    { location.href = 'admin.html';   return; }
    if (currentUser.role === 'teacher')  { location.href = 'teacher.html'; return; }
    if (currentUser.role === 'leader')   { location.href = 'leader.html';  return; }

    // 시간표용: 이름 기반으로 homeroom 추출
    window._currentUser = currentUser;
    (function() {
      const nm = (currentUser.name || '').trim();
      const id = (currentUser.id || '').replace(/_\d+$/, '').trim();
      for (const k of Object.keys(TT_DATA)) {
        const [kName] = k.split('|');
        if (kName === nm || kName === id) {
          currentUser.homeroom = k.split('|')[1] || '';
          break;
        }
      }
    })();

    const displayName = currentUser.name || currentUser.id;
    document.getElementById('sidebarName').textContent     = displayName;
    document.getElementById('avatarCircle').textContent    = displayName[0].toUpperCase();
    document.getElementById('profileAvatarLarge').textContent = displayName[0].toUpperCase();
    document.getElementById('profileDisplayName').textContent = displayName;
    document.getElementById('profileDisplayId').textContent   = currentUser.id;

    setHeaderDate();
    await Promise.all([loadAssignments(), loadNotices(), loadSubjects(), loadEvents(), loadMeals()]);
    loadProfileSubjects();
    renderTimetableTable();
  } catch(e) {
    console.error(e);
    showToast('데이터 로드 실패', 'error');
  }
})();

function setHeaderDate() {
  const now = new Date();
  const days = ['일','월','화','수','목','금','토'];
  document.getElementById('headerDate').textContent =
    `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 (${days[now.getDay()]})`;
}

// ── Navigation ──
function showSection(name, el) {
  document.querySelectorAll('.section-page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(`page-${name}`).classList.add('active');
  // el이 직접 전달되거나, 이벤트 currentTarget으로 찾기
  const navEl = el || (typeof event !== 'undefined' && event.currentTarget);
  if (navEl) navEl.classList.add('active');

  const titles = { assignments:'수행평가', notices:'공지사항', timetable:'시간표', calendar:'캘린더', meals:'오늘의 학식', profile:'프로필' };
  document.getElementById('pageTitle').textContent = titles[name] || name;

  // 뱃지 읽음 처리
  if (name === 'assignments') {
    assignments.forEach(a => readAssignIds.add(a.id));
    saveReadSet('readAssignIds', readAssignIds);
    document.getElementById('assignBadge').style.display = 'none';
  }
  if (name === 'notices') {
    notices.forEach(n => readNoticeIds.add(n.id));
    saveReadSet('readNoticeIds', readNoticeIds);
    document.getElementById('noticeBadge').style.display = 'none';
  }
  if (name === 'timetable') {
    renderWeeklyTimetable();
  }

  if (window.innerWidth <= 768) closeSidebar();
  if (name === 'calendar') renderCalendar();
}

// ── Assignments ──
async function loadAssignments() {
  try {
    const res = await fetch('/api/assignments', { credentials: 'include' });
    const data = await res.json();
    assignments = data.assignments || data || [];
    renderAssignBoard();
    updateAssignBadge();
  } catch(e) { console.error('assignments load fail', e); }
}

function updateAssignBadge() {
  const newItems = assignments.filter(a => !readAssignIds.has(a.id));
  const badge = document.getElementById('assignBadge');
  if (newItems.length > 0) { badge.textContent = newItems.length; badge.style.display = ''; }
  else badge.style.display = 'none';
}

function renderAssignBoard() {
  const board = document.getElementById('assignmentBoard');
  board.innerHTML = '';

  const todayAssigns = assignments.filter(a => getDaysLeft(a.due_date) >= -3);
  const filtered = todayAssigns.filter(a => {
    const tOk = !filterType   || a.type === filterType;
    const sOk = !filterStatus || (filterStatus === 'done' ? a.completed : !a.completed);
    return tOk && sOk;
  });

  const bySubject = {};
  filtered.forEach(a => {
    const key = a.subject_name || '기타';
    if (!bySubject[key]) bySubject[key] = [];
    bySubject[key].push(a);
  });

  if (Object.keys(bySubject).length === 0) {
    board.innerHTML = '<div class="empty-state"><p>표시할 과제가 없습니다.</p></div>';
  } else {
    Object.entries(bySubject).forEach(([subj, cards]) => {
      const col = document.createElement('div');
      col.className = 'subject-col';
      col.innerHTML = `
        <div class="subject-col-header">
          <span class="subject-name">${subj}</span>
          <span class="subject-count">${cards.length}</span>
        </div>
        <div class="subject-cards"></div>
      `;
      const container = col.querySelector('.subject-cards');
      cards.forEach(a => container.appendChild(makeAssignCard(a)));
      board.appendChild(col);
    });
  }

  const total  = todayAssigns.length;
  const done   = todayAssigns.filter(a => a.completed).length;
  const urgent = todayAssigns.filter(a => !a.completed && getDaysLeft(a.due_date) <= 2).length;
  document.getElementById('assignStats').innerHTML = `
    <div class="stat-chip"><div class="s-val">${total}</div><div class="s-lbl">전체 과제</div></div>
    <div class="stat-chip"><div class="s-val" style="color:var(--red)">${total - done}</div><div class="s-lbl">미완료</div></div>
    <div class="stat-chip"><div class="s-val" style="color:var(--orange)">${urgent}</div><div class="s-lbl">긴급 (2일 이내)</div></div>
    <div class="stat-chip"><div class="s-val" style="color:var(--accent2)">${done}</div><div class="s-lbl">완료</div></div>
  `;
}

function makeAssignCard(a) {
  const el = document.createElement('div');
  const days = getDaysLeft(a.due_date);
  let urgency = '';
  if (!a.completed) {
    if (days <= 1) urgency = 'urgent';
    else if (days <= 3) urgency = 'soon';
  }
  el.className = `assign-card type-${a.type || '일반'} ${a.completed ? 'completed' : ''}`;
  el.innerHTML = `
    <div class="assign-card-top">
      <div class="assign-title">${escHtml(a.title)}</div>
      <button class="check-btn ${a.completed ? 'checked' : ''}" onclick="toggleComplete(event,${a.id})" title="완료 표시"></button>
    </div>
    <div class="assign-meta">
      ${a.type ? `<span class="badge ${a.type === '진로' ? 'badge-blue' : 'badge-green'}">${a.type}</span>` : ''}
      <span class="assign-due ${urgency}">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
        ${formatDue(a.due_date, days)}
      </span>
    </div>
  `;
  el.addEventListener('click', e => { if (e.target.classList.contains('check-btn')) return; openAssignDetail(a.id); });
  return el;
}

function getDaysLeft(due) {
  if (!due) return 9999;
  const d = new Date(due); const now = new Date(); now.setHours(0,0,0,0);
  return Math.ceil((d - now) / 86400000);
}
function formatDue(due, days) {
  if (!due) return '기한 없음';
  const d = new Date(due); const mm = d.getMonth()+1, dd = d.getDate();
  if (days < 0)  return `${mm}/${dd} (마감)`;
  if (days === 0) return '오늘 마감';
  if (days === 1) return '내일 마감';
  if (days <= 7)  return `${days}일 후`;
  return `${mm}/${dd}`;
}

async function toggleComplete(e, id) {
  e.stopPropagation();
  const a = assignments.find(x => x.id === id); if (!a) return;
  const newVal = !a.completed;
  try {
    await fetch('/api/timetable/complete', { method: 'POST', headers: {'Content-Type':'application/json'}, credentials:'include', body: JSON.stringify({ assignment_id: id, completed: newVal }) });
    a.completed = newVal;
    renderAssignBoard();
    showToast(newVal ? '완료 처리했습니다.' : '미완료로 변경했습니다.', 'success');
  } catch { showToast('업데이트 실패', 'error'); }
}

async function openAssignDetail(id) {
  const a = assignments.find(x => x.id === id); if (!a) return;
  currentAssign = a;
  document.getElementById('assignDetailTitle').textContent = a.title;
  const days = getDaysLeft(a.due_date);
  document.getElementById('assignDetailMeta').innerHTML = `
    <span>${a.subject_name || ''}</span><span>${a.type || ''}</span>
    <span class="${days <= 2 && !a.completed ? 'assign-due urgent' : ''}">마감: ${a.due_date ? new Date(a.due_date).toLocaleDateString('ko-KR') : '없음'}</span>
  `;
  document.getElementById('assignDetailContent').textContent = a.description || '내용 없음';
  const imgs = document.getElementById('assignDetailImages'); imgs.innerHTML = '';
  (a.images || []).forEach(url => { const img = document.createElement('img'); img.src = url; img.onclick = () => window.open(url,'_blank'); imgs.appendChild(img); });
  updateModalCompleteBtn(a.completed);
  document.getElementById('assignModal').style.display = 'flex';
  loadComments('assignment', id, 'assignCommentList');
}

function updateModalCompleteBtn(isDone) {
  const btn = document.getElementById('modalCompleteBtn');
  const icon = document.getElementById('modalCheckIcon');
  const label = document.getElementById('modalCompleteLabel');
  if (isDone) { btn.classList.add('is-done'); icon.textContent = '✓'; label.textContent = '완료됨'; }
  else        { btn.classList.remove('is-done'); icon.textContent = ''; label.textContent = '완료로 표시'; }
}

async function modalToggleComplete() {
  if (!currentAssign) return;
  const newVal = !currentAssign.completed;
  try {
    await fetch('/api/timetable/complete', { method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include', body: JSON.stringify({ assignment_id: currentAssign.id, completed: newVal }) });
    currentAssign.completed = newVal;
    const a = assignments.find(x => x.id === currentAssign.id); if (a) a.completed = newVal;
    updateModalCompleteBtn(newVal);
    showToast(newVal ? '완료 처리했습니다.' : '미완료로 변경했습니다.', 'success');
    renderAssignBoard();
    if (document.getElementById('page-calendar').classList.contains('active')) renderCalendar();
  } catch { showToast('업데이트 실패', 'error'); }
}

document.getElementById('typeFilter').addEventListener('click', e => {
  const t = e.target.closest('.filter-tab'); if (!t) return;
  document.querySelectorAll('#typeFilter .filter-tab').forEach(x => x.classList.remove('active'));
  t.classList.add('active'); filterType = t.dataset.val; renderAssignBoard();
});
document.getElementById('statusFilter').addEventListener('click', e => {
  const t = e.target.closest('.filter-tab'); if (!t) return;
  document.querySelectorAll('#statusFilter .filter-tab').forEach(x => x.classList.remove('active'));
  t.classList.add('active'); filterStatus = t.dataset.val; renderAssignBoard();
});

// ── Notices ──
async function loadNotices() {
  try {
    const res = await fetch('/api/notices', { credentials: 'include' });
    const data = await res.json();
    notices = data.notices || data || [];
    renderNotices();
    updateNoticeBadge();
  } catch(e) { console.error(e); }
}

function updateNoticeBadge() {
  const newItems = notices.filter(n => !readNoticeIds.has(n.id));
  const badge = document.getElementById('noticeBadge');
  if (newItems.length > 0) { badge.textContent = newItems.length; badge.style.display = ''; }
  else badge.style.display = 'none';
}

function renderNotices() {
  const list = document.getElementById('noticeList');
  const filtered = filterSubject ? notices.filter(n => n.subject_name === filterSubject) : notices;
  if (!filtered.length) { list.innerHTML = '<div class="empty-state"><p>공지가 없습니다.</p></div>'; return; }
  const colors = ['#72C99A','#5899C9','#D4A843','#D97070','#9B72C9'];
  list.innerHTML = filtered.map((n, i) => {
    const isNew = !readNoticeIds.has(n.id);
    const c = colors[i % colors.length];
    return `
      <div class="notice-item" onclick="openNoticeDetail(${n.id})">
        <div class="notice-type-dot" style="background:${c}"></div>
        <div class="notice-info">
          <div class="notice-title">${escHtml(n.title)}</div>
          <div class="notice-meta"><span>${escHtml(n.subject_name || '전체')}</span><span>${n.class_code || ''}</span></div>
        </div>
        ${isNew ? '<span class="notice-new">NEW</span>' : ''}
        <span class="notice-date">${fmtDate(n.created_at)}</span>
      </div>
    `;
  }).join('');
}

async function openNoticeDetail(id) {
  const n = notices.find(x => x.id === id); if (!n) return;
  currentNotice = n;
  // 개별 읽음 처리
  readNoticeIds.add(id); saveReadSet('readNoticeIds', readNoticeIds);
  updateNoticeBadge(); renderNotices();
  document.getElementById('noticeDetailTitle').textContent = n.title;
  document.getElementById('noticeDetailMeta').innerHTML = `<span>${n.subject_name || '전체'}</span><span>${fmtDate(n.created_at)}</span>`;
  document.getElementById('noticeDetailContent').textContent = n.content || '';
  const imgs = document.getElementById('noticeDetailImages'); imgs.innerHTML = '';
  (n.images || []).forEach(url => { const img = document.createElement('img'); img.src = url; img.onclick = () => window.open(url,'_blank'); imgs.appendChild(img); });
  document.getElementById('noticeModal').style.display = 'flex';
  loadComments('notice', id, 'noticeCommentList');
}

// ── Comments ──
async function loadComments(type, id, listId) {
  const list = document.getElementById(listId);
  list.innerHTML = '<div style="color:var(--muted);font-size:0.8rem;padding:8px 0">로딩 중...</div>';
  try {
    const res = await fetch(`/api/comments/${type}/${id}`, { credentials: 'include' });
    const data = await res.json();
    const comments = data.comments || data || [];
    if (!comments.length) { list.innerHTML = '<div style="color:var(--muted);font-size:0.8rem;padding:4px 0">아직 댓글이 없습니다.</div>'; return; }
    list.innerHTML = comments.map(c => `
      <div class="comment-item">
        <div class="comment-author">${escHtml(c.user_name || c.username || '익명')}</div>
        <div class="comment-text">${escHtml(c.content)}</div>
        <div class="comment-time">${fmtDateTime(c.created_at)}</div>
      </div>
    `).join('');
  } catch { list.innerHTML = ''; }
}

async function submitComment(type) {
  const inputId = type === 'notice' ? 'noticeCommentInput' : 'assignCommentInput';
  const listId  = type === 'notice' ? 'noticeCommentList'  : 'assignCommentList';
  const refId   = type === 'notice' ? currentNotice?.id    : currentAssign?.id;
  const input   = document.getElementById(inputId);
  const content = input.value.trim();
  if (!content || !refId) return;
  try {
    await fetch('/api/comments', { method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include', body: JSON.stringify({ type, ref_id: refId, content }) });
    input.value = ''; loadComments(type, refId, listId); showToast('댓글이 등록되었습니다.', 'success');
  } catch { showToast('댓글 등록 실패', 'error'); }
}

// ── Subjects (for filter) ──
async function loadSubjects() {
  try {
    const res = await fetch('/api/subjects', { credentials: 'include' });
    const data = await res.json();
    subjects = data.subjects || data || [];
    const f = document.getElementById('noticeSubjectFilter');
    subjects.forEach(s => {
      const btn = document.createElement('button'); btn.className = 'filter-tab'; btn.dataset.val = s.subject_name; btn.textContent = s.subject_name;
      f.appendChild(btn);
    });
    f.addEventListener('click', e => {
      const t = e.target.closest('.filter-tab'); if (!t) return;
      f.querySelectorAll('.filter-tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active'); filterSubject = t.dataset.val; renderNotices();
    });
  } catch {}
}

// ── Events ──
async function loadEvents() {
  try {
    const res = await fetch('/api/timetable/personal', { credentials: 'include' });
    const data = await res.json();
    events = data.events || data || [];
  } catch(e) { console.error(e); }
}

// ── Calendar ──
let calYear  = new Date().getFullYear();
let calMonth = new Date().getMonth();
let calSelectedDate = null;
let calDraggingAssign = null;

function calMove(dir) {
  calMonth += dir;
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0;  calYear++; }
  renderCalendar();
}
function switchCalTab(tab) {
  document.getElementById('calTabAssign').classList.toggle('active', tab === 'assign');
  document.getElementById('calTabDate').classList.toggle('active',   tab === 'date');
  document.getElementById('tabBtnAssign').classList.toggle('active', tab === 'assign');
  document.getElementById('tabBtnDate').classList.toggle('active',   tab === 'date');
}
async function calAddEvent() {
  const title = document.getElementById('calAddTitle').value.trim();
  const memo  = document.getElementById('calAddMemo').value.trim();
  if (!title) { showToast('제목을 입력하세요.', 'error'); return; }
  if (!calSelectedDate) return;
  try {
    await fetch('/api/timetable/personal', { method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include', body: JSON.stringify({ title, description: memo||null, due_date: calSelectedDate }) });
    document.getElementById('calAddTitle').value = ''; document.getElementById('calAddMemo').value = '';
    showToast('일정이 추가되었습니다.', 'success');
    await loadEvents(); renderCalendar();

function personalEvRowInner(id, title, desc) {

    <div style="flex:1">

          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>

        </svg>

function buildCalEvMap() {
  const evMap = {};
  assignments.filter(a => !a.completed).forEach(a => {
    if (!a.due_date) return;
    const key = a.due_date.slice(0,10);
    if (!evMap[key]) evMap[key] = [];
    evMap[key].push({ kind:'assign', item:a });
  });
  events.forEach(ev => {
    if (!ev.due_date) return;
    const key = ev.due_date.slice(0,10);
    if (!evMap[key]) evMap[key] = [];
    evMap[key].push({ kind:'personal', item:ev });
  });
  return evMap;
}
function renderCalDragSource() {
  const container = document.getElementById('calDragSource'); if (!container) return;
  const pending = assignments.filter(a => !a.completed && getDaysLeft(a.due_date) >= -3);
  if (!pending.length) { container.innerHTML = '<div style="color:var(--muted);font-size:0.8rem;text-align:center;padding:16px 0">미완료 수행평가가 없습니다.</div>'; return; }
  container.innerHTML = pending.map(a => {
    const days = getDaysLeft(a.due_date);
    const dueClass = days <= 1 ? 'urgent' : days <= 4 ? 'soon' : 'ok';
    const dueLabel = days < 0 ? '마감' : days === 0 ? '오늘' : days === 1 ? '내일' : `${days}일`;
    const dotColor = a.type === '진로' ? 'var(--blue)' : 'var(--accent)';
    return `
      <div class="cal-drag-chip" draggable="true" data-assign-id="${a.id}" title="${escHtml(a.title)}">
        <div class="cal-drag-chip-dot" style="background:${dotColor}"></div>
        <div class="cal-drag-chip-info">
          <div class="cal-drag-chip-title">${escHtml(a.title)}</div>
          <div class="cal-drag-chip-sub">${escHtml(a.subject_name||'')} · ${a.type||'일반'}</div>
        </div>
        <div class="cal-drag-chip-due ${dueClass}">${dueLabel}</div>
      </div>
    `;
  }).join('');
  container.querySelectorAll('.cal-drag-chip').forEach(chip => {
    chip.addEventListener('dragstart', onChipDragStart);
    chip.addEventListener('dragend',   onChipDragEnd);
  });
}
function onChipDragStart(e) {
  const id = parseInt(e.currentTarget.dataset.assignId);
  calDraggingAssign = assignments.find(a => a.id === id) || null;
  if (!calDraggingAssign) return;
  e.dataTransfer.effectAllowed = 'copy';
  e.currentTarget.classList.add('dragging');
  const todayKey = new Date().toISOString().slice(0,10);
  const dueKey   = calDraggingAssign.due_date ? calDraggingAssign.due_date.slice(0,10) : null;
  const grid = document.getElementById('calGrid'); grid.classList.add('drag-active');
  grid.querySelectorAll('.cal-cell[data-date]').forEach(cell => {
    const cd = cell.dataset.date;
    if (cd < todayKey || (dueKey && cd > dueKey)) cell.classList.add('drop-invalid');
  });
}
function onChipDragEnd(e) {
  e.currentTarget.classList.remove('dragging'); calDraggingAssign = null;
  const grid = document.getElementById('calGrid'); grid.classList.remove('drag-active');
  grid.querySelectorAll('.cal-cell').forEach(c => c.classList.remove('drop-invalid','drop-valid'));
}
function onCellDragOver(e, dateKey) {
  e.preventDefault(); if (!calDraggingAssign) return;
  const cell = e.currentTarget;
  if (cell.classList.contains('drop-invalid')) { e.dataTransfer.dropEffect = 'none'; return; }
  e.dataTransfer.dropEffect = 'copy'; cell.classList.add('drop-valid');
}
function onCellDragLeave(e) { e.currentTarget.classList.remove('drop-valid'); }
async function onCellDrop(e, dateKey) {
  e.preventDefault();
  const cell = e.currentTarget; cell.classList.remove('drop-valid','drop-invalid');
  if (!calDraggingAssign) return;
  const todayKey = new Date().toISOString().slice(0,10);
  const dueKey   = calDraggingAssign.due_date ? calDraggingAssign.due_date.slice(0,10) : null;
  if (dateKey < todayKey) { showToast('오늘 이전 날짜에는 배치할 수 없습니다.', 'error'); return; }
  if (dueKey && dateKey > dueKey) { showToast('마감일 이후에는 배치할 수 없습니다.', 'error'); return; }
  const a = calDraggingAssign;
  try {
    await fetch('/api/timetable/personal', { method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include', body: JSON.stringify({ title:`[${a.subject_name||'과제'}] ${a.title}`, description:`마감: ${a.due_date||'없음'} / 수행평가 공부 계획`, due_date: dateKey }) });
    cell.classList.add('drop-flash');
    cell.addEventListener('animationend', () => cell.classList.remove('drop-flash'), { once:true });
    showToast('공부 계획이 등록되었습니다! 📅', 'success');
    await loadEvents(); renderCalendar();
  } catch { showToast('등록 실패. 다시 시도해주세요.', 'error'); }
}
function renderCalendar() {
  const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('calMonthLabel').textContent = `${calYear}년 ${monthNames[calMonth]}`;
  renderCalDragSource();
  const today = new Date(); today.setHours(0,0,0,0);
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const daysInPrev  = new Date(calYear, calMonth, 0).getDate();
  const evMap = buildCalEvMap();
  const grid = document.getElementById('calGrid'); grid.innerHTML = '';
  const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;
  for (let i = 0; i < totalCells; i++) {
    let dateNum, isCurrentMonth = true;
    if (i < firstDay) { dateNum = daysInPrev - firstDay + i + 1; isCurrentMonth = false; }
    else if (i >= firstDay + daysInMonth) { dateNum = i - firstDay - daysInMonth + 1; isCurrentMonth = false; }
    else dateNum = i - firstDay + 1;
    const cellDate = isCurrentMonth ? new Date(calYear, calMonth, dateNum) : (i < firstDay ? new Date(calYear, calMonth-1, dateNum) : new Date(calYear, calMonth+1, dateNum));
    const dateKey = `${cellDate.getFullYear()}-${String(cellDate.getMonth()+1).padStart(2,'0')}-${String(cellDate.getDate()).padStart(2,'0')}`;
    const isToday = cellDate.getTime() === today.getTime();
    const dow = cellDate.getDay();
    const isSelected = calSelectedDate === dateKey;
    const cell = document.createElement('div');
    cell.className = ['cal-cell', !isCurrentMonth?'other-month':'', isToday?'today':'', isSelected?'selected':'', dow===0?'sunday':'', dow===6?'saturday':''].filter(Boolean).join(' ');
    cell.dataset.date = dateKey;
    cell.addEventListener('dragover',  e => onCellDragOver(e, dateKey));
    cell.addEventListener('dragleave', onCellDragLeave);
    cell.addEventListener('drop',      e => onCellDrop(e, dateKey));
    const cellEvs = evMap[dateKey] || [];
    const shown = cellEvs.slice(0,3), more = cellEvs.length - 3;
    cell.innerHTML = `
      <div class="cal-day-num">${dateNum}</div>
      <div class="cal-events">
        ${shown.map(e => e.kind==='assign' ? `<div class="cal-event-chip type-assign ${e.item.type==='진로'?'진로':''}">${escHtml(e.item.subject_name||'')} ${escHtml(e.item.title)}</div>` : `<div class="cal-event-chip type-personal">${escHtml(e.item.title)}</div>`).join('')}
        ${more > 0 ? `<div class="cal-more">+${more}개 더</div>` : ''}
      </div>
    `;
    cell.addEventListener('click', () => selectCalDate(dateKey, cellDate, evMap[dateKey]||[]));
    grid.appendChild(cell);
  }
  if (calSelectedDate) {
    const parts = calSelectedDate.split('-');
    renderCalDetailPanel(calSelectedDate, new Date(+parts[0], +parts[1]-1, +parts[2]), evMap[calSelectedDate]||[]);
  }
}
function selectCalDate(dateKey, dateObj, evs) {
  calSelectedDate = dateKey;
  document.querySelectorAll('#calGrid .cal-cell').forEach(c => c.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  switchCalTab('date');
  renderCalDetailPanel(dateKey, dateObj, evs);
  document.getElementById('calRightCol').classList.add('mobile-show');
}
function renderCalDetailPanel(dateKey, dateObj, evs) {
  const dayNames = ['일','월','화','수','목','금','토'];
  document.getElementById('calDetailDate').textContent = `${dateObj.getMonth()+1}월 ${dateObj.getDate()}일 (${dayNames[dateObj.getDay()]})`;
  const list = document.getElementById('calDetailList');
  if (!evs.length) { list.innerHTML = '<div class="cal-detail-empty">이 날에 일정이 없습니다.</div>'; }
  else {
    list.innerHTML = evs.map(e => {
      if (e.kind === 'assign') {
        const a = e.item; const dotColor = a.type === '진로' ? 'var(--blue)' : 'var(--accent)';
        return `<div class="cal-detail-item" onclick="openAssignDetail(${a.id})"><div class="cal-detail-dot" style="background:${dotColor}"></div><div><div class="cal-detail-title">${escHtml(a.title)}</div><div class="cal-detail-sub">${escHtml(a.subject_name||'')} · 마감 ${fmtDate(a.due_date)}</div></div></div>`;
      } else {
        const ev = e.item;
        return `<div class="cal-detail-item" id="cal-ev-row-${ev.id}" style="cursor:default;align-items:flex-start">${personalEvRowInner(ev.id, ev.title, ev.description||'')}</div>`;
      }
    }).join('');
  }
  document.getElementById('calAddForm').style.display = 'block';
  document.getElementById('calAddTitle').value = '';
  document.getElementById('calAddMemo').value  = '';
}

function renderMealMenu(meal) {

  const items = Array.isArray(meal.menu) ? meal.menu : meal.menu.split('\n');
  return `<div class="meal-menu">${items.map(i=>`<span>${escHtml(i.trim())}</span>`).join('')}</div>${meal.calories ? `<div class="meal-cal">🔥 ${meal.calories} kcal</div>` : ''}`;
}
function switchMealTab(btn, type) {
  btn.closest('.meal-card').querySelectorAll('.meal-tab').forEach(t => t.classList.remove('active'));

  document.getElementById(`meal-${type}`).style.display = '';
}

async function changePassword() {
  const current_password = document.getElementById('curPwInput').value;
  const new_password     = document.getElementById('newPwInput').value;
  const confirm_password = document.getElementById('newPwConfirmInput').value;
  if (!current_password || !new_password || !confirm_password) { showToast('모든 필드를 입력하세요.', 'error'); return; }
  if (new_password !== confirm_password) { showToast('새 비밀번호가 일치하지 않습니다.', 'error'); return; }
  try {
    const res = await fetch('/api/me/password', { method:'PUT', headers:{'Content-Type':'application/json'}, credentials:'include', body: JSON.stringify({ current_password, new_password }) });
    const data = await res.json();
    if (!res.ok) { showToast(data.message||'변경 실패', 'error'); return; }
    showToast('비밀번호가 변경되었습니다.', 'success');
    ['curPwInput','newPwInput','newPwConfirmInput'].forEach(id => document.getElementById(id).value = '');
  } catch { showToast('변경 실패', 'error'); }
}

// ── Utils ──
function escHtml(str) { return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(str) { if (!str) return ''; const d = new Date(str); return `${d.getMonth()+1}/${d.getDate()}`; }
function fmtDateTime(str) { if (!str) return ''; const d = new Date(str); return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
function showToast(msg, type='info') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div'); t.className = `toast ${type}`; t.textContent = msg;
  c.appendChild(t); setTimeout(() => t.remove(), 3000);
}

function ttGetCategory(subjectName) {
  if (!subjectName) return '';
  // 진로과목 판별: 이름에서 괄호 제거 후 매칭
  const base = subjectName.replace(/\([^)]*\)/g, '').trim();
  for (const j of TT_JINRO_SUBJECTS) {
    if (base.includes(j.replace(/\s/g,'').slice(0,4)) || j.includes(base.replace(/\s/g,'').slice(0,4))) {
      return '진로';
    }
  }
  return '일반';
}

function ttNormalizeName(name) {
  // 이름에 반 번호 suffix 제거: 김민준_1 -> 김민준
  return name ? name.replace(/_\d+$/, '') : name;
}

function ttFindKey(userName, homeroom) {
  if (!userName) return null;
  // exact match with homeroom
  const exactKey = userName + '|' + homeroom;
  if (TT_DATA[exactKey]) return exactKey;
  // match by name+homeroom (DB id may have suffix like _1)
  const baseName = ttNormalizeName(userName);
  const withHomeroom = baseName + '|' + homeroom;
  if (TT_DATA[withHomeroom]) return withHomeroom;
  // fallback: search all keys where name matches
  const candidates = Object.keys(TT_DATA).filter(k => k.split('|')[0] === baseName);
  return candidates[0] || null;
}

function ttGetCurrentPeriod() {
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes();
  const mins = h * 60 + m;
  // 교시 시간표 (대략)
  const periods = [
    [480, 530],  // 1교시 8:00~8:50
    [540, 590],  // 2교시 9:00~9:50
    [600, 650],  // 3교시 10:00~10:50
    [660, 710],  // 4교시 11:00~11:50
    [750, 800],  // 5교시 12:30~13:20 (점심 후)
    [810, 860],  // 6교시 13:30~14:20
    [870, 920],  // 7교시 14:30~15:20
  ];
  for (let i = 0; i < periods.length; i++) {
    if (mins >= periods[i][0] && mins <= periods[i][1]) return i + 1;
  }
  return -1;
}

async function renderWeeklyTimetable() {
  const me = currentUser;
  if (!me) return;

  const days = ['월', '화', '수', '목', '금'];
  const dayNames = { '월':'월요일','화':'화요일','수':'수요일','목':'목요일','금':'금요일' };
  const today = new Date();
  const todayDayIdx = today.getDay(); // 0=Sun, 1=Mon...5=Fri
  const todayDayKey = ['', '월', '화', '수', '목', '금', ''][todayDayIdx] || '';

  // Find timetable key — try name first (more reliable), then id
  const homeroom = me.homeroom || '';
  const userName = (me.name || '').trim();
  const userId = (me.id || '').replace(/_\d+$/, '').trim();
  const key = ttFindKey(userName, homeroom)
           || ttFindKey(userId, homeroom)
           || ttFindKey(ttNormalizeName(me.id), homeroom)
           || Object.keys(TT_DATA).find(k => k.split('|')[0] === userName)
           || Object.keys(TT_DATA).find(k => k.split('|')[0] === userId);
  
  const wrap = document.getElementById('ttWeeklyGrid');
  const todayPanel = document.getElementById('ttTodayPanel');
  const todayLabel = document.getElementById('ttTodayLabel');
  const todaySlots = document.getElementById('ttTodaySlots');
  const homroomBadge = document.getElementById('ttHomroomBadge');
  const homroomText = document.getElementById('ttHomroomText');

  if (!key) {
    wrap.innerHTML = `<div style="color:var(--muted);font-size:0.83rem;text-align:center;padding:20px;grid-column:1/-1">시간표 정보를 찾을 수 없습니다.<br><span style="font-size:0.75rem;color:var(--text3)">(ID: ${me.id})</span></div>`;
    todayPanel.style.display = 'none';
    return;
  }

  const schedule = TT_DATA[key];
  const hrCode = key.split('|')[1] || '';
  if (hrCode && homroomBadge) {
    homroomBadge.style.display = 'inline-flex';
    homroomText.textContent = hrCode + ' 반';
  }

  // ── 오늘 패널 ──
  const currentPeriod = ttGetCurrentPeriod();
  if (todayDayKey && schedule[todayDayKey]) {
    const todaySchedule = schedule[todayDayKey];
    const dayName = dayNames[todayDayKey] || todayDayKey;
    const dateStr = `${today.getMonth()+1}월 ${today.getDate()}일 ${dayName}`;
    todayLabel.textContent = `📅 오늘 (${dateStr}) 시간표`;
    todaySlots.innerHTML = todaySchedule.map((subj, i) => {
      if (!subj) return '';
      const p = i + 1;
      const isCurrent = p === currentPeriod;
      const cat = ttGetCategory(subj);
      return `<div class="tt-today-slot${isCurrent ? ' current-period' : ''}">
        <span class="period-num">${p}교시</span>
        ${isCurrent ? '<span class="tt-now-indicator"></span>' : ''}
        <span style="color:${cat==='진로'?'var(--blue)':'var(--accent)'};font-weight:${isCurrent?700:500}">${escHtml(subj)}</span>
      </div>`;
    }).filter(Boolean).join('') || '<span style="color:var(--muted);font-size:0.83rem">오늘은 수업이 없습니다.</span>';
    todayPanel.style.display = 'block';
  } else {
    todayPanel.style.display = 'none';
  }

  // ── 주간 그리드 ──
  let html = '';

  // Header row: period label + day headers
  html += `<div class="tt-period-label" style="grid-row:1">교시</div>`;
  days.forEach(day => {
    const isToday = day === todayDayKey;
    html += `<div class="tt-header${isToday?' today-col':''}">
      ${day}<br><span style="font-size:0.65rem;font-weight:400;opacity:0.7">${isToday?'오늘':''}</span>
    </div>`;
  });

  // Period rows
  for (let p = 0; p < 7; p++) {
    const periodNum = p + 1;
    const isCurrentPeriod = periodNum === currentPeriod && todayDayKey;
    html += `<div class="tt-period-label">${periodNum}</div>`;
    days.forEach(day => {
      const subj = (schedule[day] && schedule[day][p]) || '';
      const isToday = day === todayDayKey;
      const isCurrent = isToday && periodNum === currentPeriod;
      if (subj) {
        const cat = ttGetCategory(subj);
        html += `<div class="tt-subject-cell has-class type-${cat}${isToday?' today-col':''}${isCurrent?' current-period':''}">
          ${isCurrent ? '<span class="tt-now-indicator"></span>' : ''}
          <span class="tt-subj-text">${escHtml(subj)}</span>
        </div>`;
      } else {
        html += `<div class="tt-subject-cell empty${isToday?' today-col':''}"></div>`;
      }
    });
  }

  wrap.innerHTML = html;
}
