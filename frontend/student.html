<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SchoolBoard — 학생</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Assignment Board ── */
    .board-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }

    .board-scroll-wrap {
      overflow-x: auto;
      padding-bottom: 8px;
    }
    .assignment-board {
      display: flex;
      gap: 16px;
      min-width: max-content;
    }

    .subject-col {
      width: 220px;
      flex-shrink: 0;
    }
    .subject-col-header {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .subject-name {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text);
    }
    .subject-count {
      font-size: 0.72rem;
      color: var(--text3);
      background: var(--surface3);
      padding: 2px 7px;
      border-radius: 99px;
    }
    .subject-cards {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 var(--radius-sm) var(--radius-sm);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 80px;
    }

    .assign-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px;
      cursor: pointer;
      transition: all 0.18s;
      position: relative;
      overflow: hidden;
    }
    .assign-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
      border-radius: 2px 0 0 2px;
    }
    .assign-card.type-진로::before { background: var(--blue); }
    .assign-card.completed {
      opacity: 0.5;
    }
    .assign-card.completed::before { background: var(--muted); }
    .assign-card:hover {
      border-color: var(--border2);
      background: var(--surface2);
      transform: translateY(-1px);
    }
    .assign-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 6px;
      margin-bottom: 6px;
    }
    .assign-title {
      font-size: 0.83rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
      flex: 1;
    }
    .assign-card.completed .assign-title {
      text-decoration: line-through;
      color: var(--text3);
    }
    .check-btn {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 2px solid var(--border2);
      background: transparent;
      flex-shrink: 0;
      transition: all 0.15s;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .check-btn.checked {
      background: var(--accent);
      border-color: var(--accent);
    }
    .check-btn.checked::after {
      content: '✓';
      color: #fff;
      font-size: 11px;
      font-weight: 700;
    }
    .assign-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .assign-due {
      font-size: 0.72rem;
      color: var(--text3);
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .assign-due.urgent { color: var(--red); font-weight: 600; }
    .assign-due.soon   { color: var(--orange); }

    /* ── Notice Board ── */
    .notice-list { display: flex; flex-direction: column; gap: 1px; }
    .notice-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 16px;
      background: var(--surface);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid transparent;
    }
    .notice-item:hover {
      background: var(--surface2);
      border-color: var(--border);
    }
    .notice-type-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .notice-info { flex: 1; min-width: 0; }
    .notice-title {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .notice-meta {
      font-size: 0.73rem;
      color: var(--text3);
      margin-top: 2px;
      display: flex;
      gap: 8px;
    }
    .notice-date { margin-left: auto; font-size: 0.75rem; color: var(--text3); flex-shrink: 0; }
    .notice-new {
      font-size: 0.65rem;
      background: var(--red);
      color: #fff;
      padding: 1px 5px;
      border-radius: 99px;
      font-weight: 700;
    }

    /* ── Timetable ── */
    .timetable-grid {
      display: grid;
      grid-template-columns: 44px repeat(5, 1fr);
      gap: 3px;
    }
    .tt-cell {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 8px 6px;
      text-align: center;
      font-size: 0.75rem;
    }
    .tt-cell.header {
      background: var(--surface2);
      color: var(--text2);
      font-weight: 600;
      font-size: 0.72rem;
    }
    .tt-cell.period {
      color: var(--text3);
      font-size: 0.72rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tt-cell.subject {
      color: var(--text);
      font-weight: 500;
      font-size: 0.78rem;
      line-height: 1.3;
    }
    .tt-cell.subject.today {
      background: rgba(114,201,154,0.1);
      border-color: rgba(114,201,154,0.3);
      color: var(--accent);
    }
    .tt-cell.empty { color: var(--muted); font-size: 0.7rem; }

    /* ── Meals ── */
    .meal-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .meal-header {
      background: linear-gradient(135deg, var(--primary-d), var(--primary));
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .meal-header h3 {
      font-family: var(--font-display);
      font-size: 1rem;
      color: var(--mint);
    }
    .meal-date { font-size: 0.75rem; color: rgba(168,230,195,0.7); }
    .meal-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    .meal-tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text3);
      cursor: pointer;
      border: none;
      background: transparent;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .meal-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      background: rgba(114,201,154,0.05);
    }
    .meal-content { padding: 16px 18px; }
    .meal-menu { font-size: 0.83rem; color: var(--text2); line-height: 2; }
    .meal-menu span { display: block; }
    .meal-cal {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--text3);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── Personal Events ── */
    .event-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
    .event-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      background: var(--surface2);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
    }
    .event-date-badge {
      text-align: center;
      min-width: 38px;
      flex-shrink: 0;
    }
    .event-date-badge .day { font-size: 1.1rem; font-weight: 700; color: var(--accent); }
    .event-date-badge .mon { font-size: 0.68rem; color: var(--text3); }
    .event-info { flex: 1; }
    .event-title { font-size: 0.85rem; font-weight: 500; }
    .event-time  { font-size: 0.73rem; color: var(--text3); }
    .event-imgs  { display: flex; gap: 4px; }
    .event-img-thumb {
      width: 36px; height: 36px;
      border-radius: 5px;
      object-fit: cover;
      border: 1px solid var(--border);
      cursor: pointer;
    }

    /* ── Grid Layouts ── */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 1024px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
    }

    /* ── Section Header ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .section-title {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title .icon-wrap {
      width: 28px; height: 28px;
      background: var(--surface2);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      color: var(--accent);
    }

    /* ── Detail Panel (Notice / Assignment) ── */
    .detail-panel {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 640px;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: var(--shadow);
      animation: modalIn 0.25s ease;
    }
    .detail-header {
      padding: 22px 26px 16px;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0;
      background: var(--surface);
      z-index: 2;
    }
    .detail-body { padding: 20px 26px; }
    .detail-title { font-size: 1.1rem; font-weight: 700; line-height: 1.45; }
    .detail-meta  { font-size: 0.78rem; color: var(--text3); margin-top: 6px; display: flex; gap: 14px; flex-wrap: wrap; }
    .detail-content { font-size: 0.88rem; color: var(--text2); line-height: 1.8; white-space: pre-wrap; }
    .detail-images {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 8px;
      margin-top: 16px;
    }
    .detail-images img {
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .detail-images img:hover { opacity: 0.85; }

    /* ── Comments ── */
    .comments-section { margin-top: 20px; padding-top: 18px; border-top: 1px solid var(--border); }
    .comments-title { font-size: 0.85rem; font-weight: 600; color: var(--text2); margin-bottom: 12px; }
    .comment-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
    .comment-item {
      background: var(--surface2);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
    }
    .comment-author { font-size: 0.78rem; font-weight: 600; color: var(--accent); }
    .comment-text   { font-size: 0.83rem; color: var(--text2); margin-top: 3px; }
    .comment-time   { font-size: 0.7rem; color: var(--text3); margin-top: 2px; }
    .comment-input-wrap {
      display: flex; gap: 8px;
    }
    .comment-input {
      flex: 1;
      padding: 9px 12px;
      font-size: 0.84rem;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      color: var(--text);
    }
    .comment-input:focus { border-color: var(--accent); }
    .comment-submit {
      padding: 9px 16px;
      background: var(--primary-l);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.83rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .comment-submit:hover { background: var(--accent2); }

    /* ── Page section visibility ── */
    .section-page { display: none; }
    .section-page.active { display: block; }

    /* ── Calendar ── */
    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .cal-month-label {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
    }
    .cal-nav-btn {
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      color: var(--text2);
      cursor: pointer;
      transition: all 0.15s;
    }
    .cal-nav-btn:hover {
      background: var(--surface3);
      color: var(--text);
    }
    .cal-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
      margin-bottom: 4px;
    }
    .cal-weekday {
      text-align: center;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--text3);
      padding: 6px 0;
    }
    .cal-weekday:first-child { color: var(--red); }
    .cal-weekday:last-child  { color: var(--blue); }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }
    .cal-cell {
      min-height: 88px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 6px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      position: relative;
      overflow: hidden;
    }
    .cal-cell:hover {
      background: var(--surface2);
      border-color: var(--border2);
    }
    .cal-cell.today {
      border-color: rgba(114,201,154,0.4);
      background: rgba(114,201,154,0.06);
    }
    .cal-cell.today .cal-day-num {
      background: var(--accent);
      color: #0D1810;
      border-radius: 50%;
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700;
    }
    .cal-cell.other-month {
      opacity: 0.38;
    }
    .cal-cell.selected {
      border-color: var(--accent2);
      background: rgba(114,201,154,0.1);
      box-shadow: 0 0 0 1px var(--accent2);
    }
    .cal-cell.sunday  .cal-day-num { color: var(--red); }
    .cal-cell.saturday .cal-day-num { color: var(--blue); }
    .cal-day-num {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text2);
      line-height: 1;
      margin-bottom: 5px;
    }
    .cal-events {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .cal-event-chip {
      font-size: 0.66rem;
      font-weight: 500;
      padding: 2px 5px;
      border-radius: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.4;
    }
    .cal-event-chip.type-assign {
      background: rgba(114,201,154,0.18);
      color: var(--accent);
    }
    .cal-event-chip.type-assign.진로 {
      background: rgba(88,153,201,0.18);
      color: var(--blue);
    }
    .cal-event-chip.type-assign.completed {
      background: rgba(100,130,110,0.12);
      color: var(--muted);
      text-decoration: line-through;
    }
    .cal-event-chip.type-personal {
      background: rgba(212,147,74,0.18);
      color: var(--orange);
    }
    .cal-more {
      font-size: 0.63rem;
      color: var(--text3);
      padding: 1px 4px;
    }

    /* ── 드래그 오버 셀 상태 ── */
    .cal-cell.drop-valid {
      background: rgba(114,201,154,0.14) !important;
      border-color: var(--accent) !important;
      box-shadow: 0 0 0 2px rgba(114,201,154,0.3);
    }
    .cal-cell.drop-invalid {
      background: rgba(217,112,112,0.10) !important;
      border-color: rgba(217,112,112,0.35) !important;
      cursor: not-allowed;
    }
    .cal-cell.drop-invalid .cal-day-num { color: var(--red); }

    /* Calendar side panels */
    .cal-layout {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 20px;
      align-items: start;
    }
    @media (max-width: 1100px) {
      .cal-layout { grid-template-columns: 1fr; }
      .cal-right-col { display: none; }
      .cal-right-col.mobile-show { display: flex; }
    }
    .cal-right-col {
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: sticky;
      top: calc(var(--header-h) + 20px);
    }

    /* ── 드래그 소스 패널 ── */
    .cal-drag-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }
    .cal-drag-panel-title {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 6px;
    }
    .cal-drag-hint {
      font-size: 0.73rem;
      color: var(--muted);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .cal-drag-list {
      display: flex;
      flex-direction: column;
      gap: 5px;
      max-height: 260px;
      overflow-y: auto;
    }
    .cal-drag-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: grab;
      transition: all 0.15s;
      user-select: none;
    }
    .cal-drag-chip:hover {
      background: var(--surface3);
      border-color: var(--border2);
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm);
    }
    .cal-drag-chip:active { cursor: grabbing; }
    .cal-drag-chip.dragging {
      opacity: 0.45;
      transform: none;
    }
    .cal-drag-chip-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .cal-drag-chip-info { flex: 1; min-width: 0; }
    .cal-drag-chip-title {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cal-drag-chip-sub {
      font-size: 0.69rem;
      color: var(--text3);
      margin-top: 1px;
    }
    .cal-drag-chip-due {
      font-size: 0.69rem;
      font-weight: 600;
      flex-shrink: 0;
      padding: 2px 6px;
      border-radius: 99px;
    }
    .cal-drag-chip-due.urgent { background: rgba(217,112,112,0.15); color: var(--red); }
    .cal-drag-chip-due.soon   { background: rgba(212,147,74,0.15);  color: var(--orange); }
    .cal-drag-chip-due.ok     { background: rgba(114,201,154,0.12); color: var(--accent); }

    /* ── 날짜 상세 패널 ── */
    .cal-detail-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }
    .cal-detail-date {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .cal-detail-empty {
      color: var(--muted);
      font-size: 0.83rem;
      text-align: center;
      padding: 24px 0;
    }
    .cal-detail-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .cal-detail-item:last-child { border-bottom: none; }
    .cal-detail-item:hover { opacity: 0.8; }
    .cal-detail-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 5px;
    }
    .cal-detail-title {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.4;
    }
    .cal-detail-sub {
      font-size: 0.72rem;
      color: var(--text3);
      margin-top: 2px;
    }
    .cal-legend {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .cal-legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.75rem;
      color: var(--text3);
    }
    .cal-legend-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }

    /* ── 드래그&드롭 셀 상태 ── */
    /* 드래그 중 전체 그리드 모드 */
    .cal-grid.drag-active .cal-cell { transition: opacity 0.15s, background 0.15s, box-shadow 0.15s; }

    /* 드롭 가능 (마감일 이내) */
    .cal-cell.drop-valid {
      background: rgba(114,201,154,0.14) !important;
      border-color: rgba(114,201,154,0.5) !important;
      box-shadow: inset 0 0 0 2px rgba(114,201,154,0.35);
    }
    .cal-cell.drop-valid:hover,
    .cal-cell.drop-over {
      background: rgba(114,201,154,0.26) !important;
      border-color: var(--accent) !important;
      box-shadow: inset 0 0 0 2px var(--accent);
    }

    /* 드롭 불가 (마감일 초과) */
    .cal-cell.drop-invalid {
      opacity: 0.28 !important;
      cursor: not-allowed !important;
    }

    /* 드롭 성공 플래시 */
    .cal-cell.drop-flash {
      animation: dropFlash 0.45s ease;
    }
    @keyframes dropFlash {
      0%   { background: rgba(114,201,154,0.45); }
      100% { background: var(--surface); }
    }

    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .stat-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 16px;
      flex: 1;
      min-width: 100px;
    }
    .stat-chip .s-val {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
      font-family: var(--font-display);
    }
    .stat-chip .s-lbl {

<script>
// ── State ──
let currentUser   = null;
let assignments   = [];
let notices       = [];
let subjects      = [];
let events        = [];
let currentNotice = null;
let currentAssign = null;
let uploadedFiles = [];
let filterType   = '';
let filterStatus = '';
let filterSubject = '';

// ── Init ──
(async () => {
  try {
    const res = await fetch('/api/me', { credentials: 'include' });
    if (!res.ok) { location.href = 'login.html'; return; }
    currentUser = await res.json();

    if (currentUser.role === 'admin')  { location.href = 'admin.html';  return; }
    if (currentUser.role === 'leader') { location.href = 'leader.html'; return; }

    document.getElementById('sidebarName').textContent = currentUser.name || currentUser.username;
    document.getElementById('avatarCircle').textContent =
      (currentUser.name || currentUser.username || '?')[0].toUpperCase();

    setHeaderDate();
    await Promise.all([loadAssignments(), loadNotices(), loadSubjects(), loadEvents(), loadMeals(), loadTimetable()]);
  } catch(e) {
    console.error(e);
    showToast('데이터 로드 실패', 'error');
  }
})();

function setHeaderDate() {
  const now = new Date();
  const days = ['일','월','화','수','목','금','토'];
  document.getElementById('headerDate').textContent =
    `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 (${days[now.getDay()]})`;
}

// ── Navigation ──
function showSection(name) {
  document.querySelectorAll('.section-page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(`page-${name}`).classList.add('active');
  event.currentTarget.classList.add('active');

  const titles = {
    assignments: '수행평가',
    notices: '공지사항',
    calendar: '캘린더',
    events: '개인 일정',
    timetable: '나의 시간표',
    meals: '오늘의 학식'
  };
  document.getElementById('pageTitle').textContent = titles[name] || name;

  if (name === 'calendar') renderCalendar();
}

// ── Assignments ──
async function loadAssignments() {
  try {
    const res = await fetch('/api/assignments', { credentials: 'include' });
    const data = await res.json();
    assignments = data.assignments || data || [];
    renderAssignBoard();
  } catch(e) { console.error('assignments load fail', e); }
}

function renderAssignBoard() {
  const board = document.getElementById('assignmentBoard');
  board.innerHTML = '';

  const filtered = assignments.filter(a => {
    const tOk = !filterType   || a.type === filterType;
    const sOk = !filterStatus || (filterStatus === 'done' ? a.completed : !a.completed);
    return tOk && sOk;
  });

  // Group by subject
  const bySubject = {};
  filtered.forEach(a => {
    const key = a.subject_name || '기타';
    if (!bySubject[key]) bySubject[key] = [];
    bySubject[key].push(a);
  });

  if (Object.keys(bySubject).length === 0) {
    board.innerHTML = '<div class="empty-state"><p>표시할 과제가 없습니다.</p></div>';
    return;
  }

  // Stats
  const total = assignments.length;
  const done  = assignments.filter(a => a.completed).length;
  const urgent = assignments.filter(a => !a.completed && getDaysLeft(a.due_date) <= 2).length;
  document.getElementById('assignStats').innerHTML = `
    <div class="stat-chip"><div class="s-val">${total}</div><div class="s-lbl">전체 과제</div></div>
    <div class="stat-chip"><div class="s-val" style="color:var(--red)">${total - done}</div><div class="s-lbl">미완료</div></div>
    <div class="stat-chip"><div class="s-val" style="color:var(--orange)">${urgent}</div><div class="s-lbl">긴급 (2일 이내)</div></div>
    <div class="stat-chip"><div class="s-val" style="color:var(--accent2)">${done}</div><div class="s-lbl">완료</div></div>
  `;

  // Badge
  const badge = document.getElementById('assignBadge');
  if (total - done > 0) {
    badge.textContent = total - done;
    badge.style.display = '';
  }

  Object.entries(bySubject).forEach(([subj, cards]) => {
    const col = document.createElement('div');
    col.className = 'subject-col';
    col.innerHTML = `
      <div class="subject-col-header">
        <span class="subject-name">${subj}</span>
        <span class="subject-count">${cards.length}</span>
      </div>
      <div class="subject-cards" id="col-${encodeURIComponent(subj)}"></div>
    `;
    board.appendChild(col);
    const container = col.querySelector('.subject-cards');
    cards.forEach(a => container.appendChild(makeAssignCard(a)));
  });
}

function makeAssignCard(a) {
  const el = document.createElement('div');
  const days = getDaysLeft(a.due_date);
  let urgency = '';
  if (!a.completed) {
    if (days <= 1)  urgency = 'urgent';
    else if (days <= 3) urgency = 'soon';
  }
  el.className = `assign-card type-${a.type || '일반'} ${a.completed ? 'completed' : ''}`;
  el.innerHTML = `
    <div class="assign-card-top">
      <div class="assign-title">${escHtml(a.title)}</div>
      <button class="check-btn ${a.completed ? 'checked' : ''}"
              onclick="toggleComplete(event,${a.id})" title="완료 표시"></button>
    </div>
    <div class="assign-meta">
      ${a.type ? `<span class="badge ${a.type === '진로' ? 'badge-blue' : 'badge-green'}">${a.type}</span>` : ''}
      <span class="assign-due ${urgency}">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
        ${formatDue(a.due_date, days)}
      </span>
    </div>
  `;
  el.addEventListener('click', e => {
    if (e.target.classList.contains('check-btn')) return;
    openAssignDetail(a.id);
  });
  return el;
}

function getDaysLeft(due) {
  if (!due) return 9999;
  const d = new Date(due);
  const now = new Date();
  now.setHours(0,0,0,0);
  return Math.ceil((d - now) / 86400000);
}

function formatDue(due, days) {
  if (!due) return '기한 없음';
  const d = new Date(due);
  const mm = d.getMonth()+1, dd = d.getDate();
  if (days < 0)  return `${mm}/${dd} (마감)`;
  if (days === 0) return '오늘 마감';
  if (days === 1) return '내일 마감';
  if (days <= 7)  return `${days}일 후`;
  return `${mm}/${dd}`;
}

}

function handleFileSelect(e) {
  const files = Array.from(e.target.files);
  const preview = document.getElementById('uploadPreview');
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      uploadedFiles.push({ file, dataUrl: ev.target.result });
      const thumb = document.createElement('div');
      thumb.className = 'upload-thumb';
      thumb.innerHTML = `
        <img src="${ev.target.result}" />
        <button class="remove-btn" onclick="removeThumb(this)">✕</button>
      `;
      preview.appendChild(thumb);
    };
    reader.readAsDataURL(file);
  });
}

function removeThumb(btn) {
  const thumb = btn.parentElement;
  const idx = Array.from(thumb.parentElement.children).indexOf(thumb);
  uploadedFiles.splice(idx, 1);
  thumb.remove();
}

async function saveEvent() {
  const title = document.getElementById('eventTitle').value.trim();
  const date  = document.getElementById('eventDate').value;
  const time  = document.getElementById('eventTime').value;

  if (uploadedFiles.length > 0) {
    showToast('이미지 업로드 중...', 'info');
    const form = new FormData();
    uploadedFiles.forEach(f => form.append('images', f.file));
    try {
      const res = await fetch('/api/upload/multiple', { method: 'POST', credentials: 'include', body: form });
      const data = await res.json();
      imageUrls = data.urls || [];
    } catch { showToast('이미지 업로드 실패', 'error'); return; }

// ── Calendar ──
let calYear  = new Date().getFullYear();
let calMonth = new Date().getMonth(); // 0-indexed
let calSelectedDate = null;
let calDraggingAssign = null; // 현재 드래그 중인 assignment

function calMove(dir) {
  calMonth += dir;
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0;  calYear++; }
  renderCalendar();

// 드래그 소스 패널 렌더링
function renderCalDragSource() {
  const container = document.getElementById('calDragSource');
  if (!container) return;

  const pending = assignments.filter(a => !a.completed);
  if (!pending.length) {
    container.innerHTML = '<div style="color:var(--muted);font-size:0.8rem;text-align:center;padding:16px 0">미완료 수행평가가 없습니다.</div>';
    return;
  }

  container.innerHTML = pending.map(a => {
    const days = getDaysLeft(a.due_date);
    const dueClass = days <= 1 ? 'urgent' : days <= 4 ? 'soon' : 'ok';
    const dueLabel = days < 0 ? '마감' : days === 0 ? '오늘' : days === 1 ? '내일' : `${days}일`;
    const dotColor = a.type === '진로' ? 'var(--blue)' : 'var(--accent)';
    return `
      <div class="cal-drag-chip"
           draggable="true"
           data-assign-id="${a.id}"
           title="${escHtml(a.title)} — ${escHtml(a.due_date || '')}까지">
        <div class="cal-drag-chip-dot" style="background:${dotColor}"></div>
        <div class="cal-drag-chip-info">
          <div class="cal-drag-chip-title">${escHtml(a.title)}</div>
          <div class="cal-drag-chip-sub">${escHtml(a.subject_name || '')} · ${a.type || '일반'}</div>
        </div>
        <div class="cal-drag-chip-due ${dueClass}">${dueLabel}</div>
      </div>
    `;
  }).join('');

  // 드래그 이벤트 바인딩
  container.querySelectorAll('.cal-drag-chip').forEach(chip => {
    chip.addEventListener('dragstart', onChipDragStart);
    chip.addEventListener('dragend',   onChipDragEnd);
  });
}

function onChipDragStart(e) {
  const id = parseInt(e.currentTarget.dataset.assignId);
  calDraggingAssign = assignments.find(a => a.id === id) || null;
  if (!calDraggingAssign) return;

  e.dataTransfer.effectAllowed = 'copy';
  e.dataTransfer.setData('text/plain', String(id));
  e.currentTarget.classList.add('dragging');

  // 마감일 기준으로 모든 셀에 유효/무효 선행 마킹
  const grid = document.getElementById('calGrid');
  grid.classList.add('drag-active');
  grid.querySelectorAll('.cal-cell[data-date]').forEach(cell => {
    const cellDate = cell.dataset.date;
    if (calDraggingAssign.due_date && cellDate > calDraggingAssign.due_date.slice(0, 10)) {
      cell.classList.add('drop-invalid');
    }
  });
}

function onChipDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  calDraggingAssign = null;

  const grid = document.getElementById('calGrid');
  grid.classList.remove('drag-active');
  grid.querySelectorAll('.cal-cell').forEach(cell => {
    cell.classList.remove('drop-invalid', 'drop-valid');
  });
}

function onCellDragOver(e, dateKey) {
  e.preventDefault();
  if (!calDraggingAssign) return;

  const cell = e.currentTarget;
  // 이미 drop-invalid(마감 초과)인 셀이면 거부
  if (cell.classList.contains('drop-invalid')) {
    e.dataTransfer.dropEffect = 'none';
    return;
  }
  e.dataTransfer.dropEffect = 'copy';
  cell.classList.add('drop-valid');
}

function onCellDragLeave(e) {
  // drop-invalid는 유지, drop-valid만 제거
  e.currentTarget.classList.remove('drop-valid');
}

async function onCellDrop(e, dateKey) {
  e.preventDefault();
  const cell = e.currentTarget;
  cell.classList.remove('drop-valid', 'drop-invalid');

  if (!calDraggingAssign) return;

  // 마감일 초과 검사
  const isPastDue = calDraggingAssign.due_date &&
                    dateKey > calDraggingAssign.due_date.slice(0, 10);
  if (isPastDue) {
    showToast('마감일 이후에는 배치할 수 없습니다.', 'error');
    return;
  }

  const a = calDraggingAssign;
  const title = `[${a.subject_name || '과제'}] ${a.title}`;
  const desc  = `마감: ${a.due_date || '없음'} / 수행평가 공부 계획`;

  try {
    await fetch('/api/timetable/personal', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ title, description: desc, due_date: dateKey })
    });
    // 성공 플래시
    cell.classList.add('drop-flash');
    cell.addEventListener('animationend', () => cell.classList.remove('drop-flash'), { once: true });

    showToast('공부 계획이 등록되었습니다! 📅', 'success');
    await loadEvents();
    renderCalendar();
  } catch {
    showToast('등록 실패. 다시 시도해주세요.', 'error');
  }
}

function renderCalendar() {
  const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('calMonthLabel').textContent = `${calYear}년 ${monthNames[calMonth]}`;

  // 드래그 소스도 함께 갱신
  renderCalDragSource();

  const today = new Date();
  today.setHours(0,0,0,0);

  const firstDay    = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const daysInPrev  = new Date(calYear, calMonth, 0).getDate();

  // 이벤트 날짜별 맵
  const evMap = {};
  assignments.forEach(a => {
    if (!a.due_date) return;
    const key = a.due_date.slice(0, 10);
    if (!evMap[key]) evMap[key] = [];
    evMap[key].push({ kind: 'assign', item: a });
  });
  events.forEach(ev => {
    if (!ev.due_date) return;
    const key = ev.due_date.slice(0, 10);
    if (!evMap[key]) evMap[key] = [];
    evMap[key].push({ kind: 'personal', item: ev });
  });

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;

  for (let i = 0; i < totalCells; i++) {
    const cell = document.createElement('div');
    let dateNum, isCurrentMonth = true;

    if (i < firstDay) {
      dateNum = daysInPrev - firstDay + i + 1;
      isCurrentMonth = false;
    } else if (i >= firstDay + daysInMonth) {
      dateNum = i - firstDay - daysInMonth + 1;
      isCurrentMonth = false;
    } else {
      dateNum = i - firstDay + 1;
    }

    const cellDate = isCurrentMonth
      ? new Date(calYear, calMonth, dateNum)
      : i < firstDay
        ? new Date(calYear, calMonth - 1, dateNum)
        : new Date(calYear, calMonth + 1, dateNum);

    const dateKey = `${cellDate.getFullYear()}-${String(cellDate.getMonth()+1).padStart(2,'0')}-${String(cellDate.getDate()).padStart(2,'0')}`;
    const isToday    = cellDate.getTime() === today.getTime();
    const dow        = cellDate.getDay();
    const isSelected = calSelectedDate === dateKey;

    cell.className = [
      'cal-cell',
      !isCurrentMonth ? 'other-month' : '',
      isToday         ? 'today'        : '',
      isSelected      ? 'selected'     : '',
      dow === 0       ? 'sunday'       : '',
      dow === 6       ? 'saturday'     : '',
    ].filter(Boolean).join(' ');

    // data-date 속성 — 드래그 판정에 사용
    cell.dataset.date = dateKey;

    // 드래그 이벤트
    cell.addEventListener('dragover',  e => onCellDragOver(e, dateKey));
    cell.addEventListener('dragleave', onCellDragLeave);
    cell.addEventListener('drop',      e => onCellDrop(e, dateKey));

    const cellEvs = evMap[dateKey] || [];
    const maxShow = 3;
    const shown   = cellEvs.slice(0, maxShow);
    const more    = cellEvs.length - maxShow;

    cell.innerHTML = `
      <div class="cal-day-num">${dateNum}</div>
      <div class="cal-events">
        ${shown.map(e => {
          if (e.kind === 'assign') {
            const cls = e.item.completed ? 'completed' : (e.item.type === '진로' ? '진로' : '');
            return `<div class="cal-event-chip type-assign ${cls}">${escHtml(e.item.subject_name || '')} ${escHtml(e.item.title)}</div>`;
          } else {
            return `<div class="cal-event-chip type-personal">${escHtml(e.item.title)}</div>`;
          }
        }).join('')}
        ${more > 0 ? `<div class="cal-more">+${more}개 더</div>` : ''}
      </div>
    `;

    cell.addEventListener('click', () => selectCalDate(dateKey, cellDate, cellEvs));
    grid.appendChild(cell);
  }

  if (calSelectedDate) {
    const evs = evMap[calSelectedDate] || [];
    const parts = calSelectedDate.split('-');
    const d = new Date(+parts[0], +parts[1]-1, +parts[2]);
    renderCalDetailPanel(calSelectedDate, d, evs);
  }
}

function selectCalDate(dateKey, dateObj, evs) {
  calSelectedDate = dateKey;
  // 선택 셀 스타일 갱신
  document.querySelectorAll('#calGrid .cal-cell').forEach(c => c.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  renderCalDetailPanel(dateKey, dateObj, evs);
}

function renderCalDetailPanel(dateKey, dateObj, evs) {
  const days = ['일','월','화','수','목','금','토'];
  const label = `${dateObj.getMonth()+1}월 ${dateObj.getDate()}일 (${days[dateObj.getDay()]})`;
  document.getElementById('calDetailDate').textContent = label;

  const list = document.getElementById('calDetailList');
  if (!evs.length) {
    list.innerHTML = '<div class="cal-detail-empty">이 날에 일정이 없습니다.</div>';
    return;
  }

  list.innerHTML = evs.map(e => {
    if (e.kind === 'assign') {
      const a = e.item;
      const dotColor = a.type === '진로' ? 'var(--blue)' : 'var(--accent)';
      const days = getDaysLeft(a.due_date);
      return `
        <div class="cal-detail-item" onclick="openAssignDetail(${a.id})">
          <div class="cal-detail-dot" style="background:${a.completed ? 'var(--muted)' : dotColor}"></div>
          <div class="cal-detail-info">
            <div class="cal-detail-title" style="${a.completed ? 'text-decoration:line-through;color:var(--text3)' : ''}">${escHtml(a.title)}</div>
            <div class="cal-detail-sub">${escHtml(a.subject_name || '')} · ${a.type || '일반'} ${a.completed ? '· 완료' : ''}</div>
          </div>
        </div>
      `;
    } else {
      const ev = e.item;
      return `
        <div class="cal-detail-item">
          <div class="cal-detail-dot" style="background:var(--orange)"></div>
          <div class="cal-detail-info">
            <div class="cal-detail-title">${escHtml(ev.title)}</div>
            <div class="cal-detail-sub">개인 일정${ev.description ? ' · ' + escHtml(ev.description) : ''}</div>
          </div>
        </div>
      `;
    }
  }).join('');

  // 모바일에서 패널 보이기
  document.getElementById('calRightCol').classList.add('mobile-show');
}

// ── Timetable ──
async function loadTimetable() {
  try {
    const res = await fetch('/api/timetable', { credentials: 'include' });
    const data = await res.json();
    const tt = data.timetable || data || [];
    renderTimetable(tt);
  } catch {}
}

function renderTimetable(tt) {
  const grid = document.getElementById('timetableGrid');

  if (!tt.length) {
    grid.style.display = 'block';
    grid.innerHTML = '<div class="empty-state"><p>수강 중인 과목이 없습니다.</p></div>';
    return;
  }

  const 일반 = tt.filter(t => (t.category || '일반') === '일반');
  const 진로 = tt.filter(t => t.category === '진로');

  const makeCard = (t) => `
    <div style="
      background:var(--surface2);border:1px solid var(--border);
      border-radius:var(--radius-sm);padding:10px 14px;
      display:flex;align-items:center;justify-content:space-between;
    ">
      <div>
        <div style="font-size:0.88rem;font-weight:600;color:var(--text)">${escHtml(t.subject_name)}</div>
        <div style="font-size:0.75rem;color:var(--text3);margin-top:2px">${escHtml(t.class_code)}반 · ${escHtml(t.teacher || '')}</div>
      </div>
      <span class="badge ${t.category === '진로' ? 'badge-blue' : 'badge-green'}">${t.category || '일반'}</span>
    </div>
  `;

  grid.style.display = 'flex';
  grid.style.flexDirection = 'column';
  grid.style.gap = '20px';

  grid.innerHTML = `
    ${일반.length ? `
      <div>
        <div style="font-size:0.78rem;font-weight:600;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:10px">일반 과목</div>
        <div style="display:flex;flex-direction:column;gap:6px">${일반.map(makeCard).join('')}</div>
      </div>
    ` : ''}
    ${진로.length ? `
      <div>
        <div style="font-size:0.78rem;font-weight:600;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:10px">진로 과목</div>
        <div style="display:flex;flex-direction:column;gap:6px">${진로.map(makeCard).join('')}</div>
      </div>
    ` : ''}
  `;
}

// ── Meals ──
async function loadMeals() {
  try {
    const today = new Date().toISOString().split('T')[0];
    const res = await fetch(`/api/meals?date=${today}`, { credentials: 'include' });
    const data = await res.json();
    const meals = data.meals || data || {};
    renderMeals(meals, today);
  } catch(e) { console.error(e); }
}

function renderMeals(meals, date) {
  const wrap = document.getElementById('mealWrap');
  const d = new Date(date);
  const dateStr = `${d.getMonth()+1}월 ${d.getDate()}일 (${['일','월','화','수','목','금','토'][d.getDay()]})`;

  const types = [
    { key: 'breakfast', label: '조식' },
    { key: 'lunch',     label: '중식' },
    { key: 'dinner',    label: '석식' }
  ];

  wrap.innerHTML = `
    <div class="meal-card">
      <div class="meal-header">
        <h3>오늘의 급식</h3>
        <span class="meal-date">${dateStr}</span>
      </div>
      <div class="meal-tabs">
        ${types.map((t,i) => `
          <button class="meal-tab ${i===1 ? 'active' : ''}" onclick="switchMealTab(this, '${t.key}')">${t.label}</button>
        `).join('')}
      </div>
      ${types.map(t => `
        <div class="meal-content" id="meal-${t.key}" style="${t.key === 'lunch' ? '' : 'display:none'}">
          ${renderMealMenu(meals[t.key])}
        </div>
      `).join('')}
    </div>
  `;
}

function renderMealMenu(meal) {
  if (!meal || !meal.menu) {
    return '<div style="color:var(--muted);font-size:0.83rem;padding:8px 0">급식 정보가 없습니다.</div>';
  }
  const items = Array.isArray(meal.menu) ? meal.menu : meal.menu.split('\n');
  return `
    <div class="meal-menu">${items.map(i => `<span>${escHtml(i.trim())}</span>`).join('')}</div>
    ${meal.calories ? `<div class="meal-cal">🔥 ${meal.calories} kcal</div>` : ''}
  `;
}

function switchMealTab(btn, type) {
  btn.closest('.meal-card').querySelectorAll('.meal-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  btn.closest('.meal-card').querySelectorAll('.meal-content').forEach(c => c.style.display = 'none');
  document.getElementById(`meal-${type}`).style.display = '';
}

// ── Modal ──
function closeModal(id) {
  document.getElementById(id).style.display = 'none';
}

// ── Auth ──
async function logout() {
  await fetch('/api/logout', { method: 'POST', credentials: 'include' });
  location.href = 'login.html';
}

// ── Drag & Drop ──
const zone = document.getElementById('eventUploadZone');
if (zone) {
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    const files = e.dataTransfer.files;
    handleFileSelect({ target: { files } });
  });
}

// ── Sidebar toggle (mobile) ──
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ── Utilities ──
function escHtml(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fmtDate(str) {
  if (!str) return '';
  const d = new Date(str);
  return `${d.getMonth()+1}/${d.getDate()}`;
}
function fmtDateTime(str) {
  if (!str) return '';
  const d = new Date(str);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function showToast(msg, type = 'info') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

  if (e.key === 'Enter') submitComment('notice');
});
document.getElementById('assignCommentInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitComment('assignment');
});
