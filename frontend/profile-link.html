<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>프로필 연결 — SchoolBoard</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      min-height: 100vh;
      background-color: #1B4832;
      background-image:
        linear-gradient(rgba(255,255,255,0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.045) 1px, transparent 1px);
      background-size: 40px 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #fff;
      font-family: var(--font-body, 'Pretendard', sans-serif);
    }
    .card {
      width: 100%;
      max-width: 460px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 40px 36px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.35);
    }
    .card h1 { font-size: 1.5rem; font-weight: 800; margin: 0 0 6px; }
    .subtitle { font-size: 0.9rem; color: rgba(255,255,255,0.7); margin-bottom: 24px; line-height: 1.5; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 0.78rem; font-weight: 600; letter-spacing: 0.04em; color: rgba(255,255,255,0.65); margin-bottom: 6px; }
    .field input, .field select {
      width: 100%; box-sizing: border-box; padding: 12px 14px;
      background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px; color: #fff; font-size: 0.95rem; outline: none;
    }
    .field input:focus, .field select:focus { border-color: rgba(255,255,255,0.5); }
    .submit-btn {
      width: 100%; padding: 13px; margin-top: 10px;
      background: #fff; color: #1B4832; border: none; border-radius: 10px;
      font-size: 0.95rem; font-weight: 700; cursor: pointer;
    }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-box {
      display: none; padding: 10px 12px; margin-bottom: 14px;
      background: rgba(220,80,80,0.18); border: 1px solid rgba(220,80,80,0.4);
      border-radius: 8px; font-size: 0.85rem; color: #ffd0d0;
    }
    .top-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 18px; font-size: 0.8rem; color: rgba(255,255,255,0.55);
    }
    .top-bar a { color: rgba(255,255,255,0.7); text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="top-bar">
      <span id="emailLabel"></span>
      <a href="#" id="logoutLink">로그아웃</a>
    </div>
    <h1>프로필 연결</h1>
    <div class="subtitle">학생 정보를 입력하면 기존 학사 데이터(과제, 댓글, 일정)와 자동으로 연결됩니다.</div>

    <div class="error-box" id="errorBox"></div>

    <form id="linkForm">
      <div class="field">
        <label for="name">이름</label>
        <input type="text" id="name" placeholder="홍길동" required />
      </div>
      <div class="field">
        <label for="classNum">반 (3학년)</label>
        <select id="classNum" required>
          <option value="">반 선택</option>
          <option value="1">3학년 1반</option>
          <option value="2">3학년 2반</option>
          <option value="3">3학년 3반</option>
          <option value="4">3학년 4반</option>
          <option value="5">3학년 5반</option>
          <option value="6">3학년 6반</option>
          <option value="7">3학년 7반</option>
          <option value="8">3학년 8반</option>
          <option value="9">3학년 9반</option>
          <option value="10">3학년 10반</option>
        </select>
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">연결하기</button>
    </form>
  </div>

  <script type="module">
    import { getCurrentUser, getMyMapping, linkProfile, logout, redirectToRolePage } from './js/auth.js';

    const err = document.getElementById('errorBox');
    const btn = document.getElementById('submitBtn');

    (async () => {
      const user = await getCurrentUser();
      if (!user) {
        location.href = 'login.html';
        return;
      }
      if (!user.emailVerified) {
        location.href = 'login.html?msg=verify';
        return;
      }
      // 이미 매핑되어 있으면 바로 역할 페이지로
      const mapping = await getMyMapping();
      if (mapping) {
        redirectToRolePage(mapping.role);
        return;
      }
      document.getElementById('emailLabel').textContent = user.email;
    })();

    document.getElementById('logoutLink').addEventListener('click', async (e) => {
      e.preventDefault();
      await logout();
      location.href = 'login.html';
    });

    document.getElementById('linkForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      err.style.display = 'none';

      const name = document.getElementById('name').value.trim();
      const classNum = document.getElementById('classNum').value;

      if (!name || !classNum) {
        showError('이름과 반을 모두 입력하세요.');
        return;
      }

      btn.disabled = true;
      btn.textContent = '연결 중...';

      try {
        const mapping = await linkProfile({ name, classNum });
        redirectToRolePage(mapping.role);
      } catch (e2) {
        btn.disabled = false;
        btn.textContent = '연결하기';
        showError(e2.message || '연결에 실패했습니다.');
      }
    });

    function showError(msg) {
      err.textContent = msg;
      err.style.display = 'block';
    }
  </script>
</body>
</html>
